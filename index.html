<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>한글 친구들 — 십이간지와 한글 모험</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
:root{
  --sky:#CDEBFF; --sky2:#F2FBEF;
  --sun:#FFC838; --sun-dk:#E8A80A;
  --melon:#FF6F61; --melon-dk:#E04B3D;
  --mint:#57C99B; --mint-dk:#37A97B;
  --grape:#9B7EDE; --grape-dk:#7B5EC0;
  --ink:#3A3049; --ink-soft:#6E6483;
  --paper:#FFFFFF; --shadow:#B9D9EC;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:'Jua','BM Jua','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  background:linear-gradient(180deg,var(--sky) 0%,var(--sky2) 100%);
  color:var(--ink);overflow-x:hidden;user-select:none;-webkit-user-select:none;}
#app{max-width:520px;margin:0 auto;min-height:100dvh;padding:14px 16px 30px;position:relative;}
.cloud{position:fixed;font-size:44px;opacity:.5;pointer-events:none;z-index:0;animation:drift 60s linear infinite;}
@keyframes drift{from{transform:translateX(-15vw);}to{transform:translateX(115vw);}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}

.top{display:flex;align-items:center;gap:8px;position:relative;z-index:2;margin-bottom:10px;flex-wrap:wrap;}
.top .spacer{flex:1;}
.chip{background:var(--paper);border:3px solid #EAF2F8;border-radius:999px;padding:6px 13px;font-size:16px;
  box-shadow:0 4px 0 var(--shadow);display:inline-flex;align-items:center;gap:6px;}
.iconbtn{width:46px;height:46px;border-radius:16px;border:3px solid #EAF2F8;background:var(--paper);
  font-size:22px;box-shadow:0 4px 0 var(--shadow);cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:transform .08s;font-family:inherit;}
.iconbtn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--shadow);}

.btn{display:block;width:100%;border:none;border-radius:24px;cursor:pointer;font-family:inherit;font-size:23px;
  color:#fff;padding:16px 20px;background:var(--sun);box-shadow:0 7px 0 var(--sun-dk);
  transition:transform .08s,box-shadow .08s;position:relative;z-index:1;text-align:center;}
.btn:active{transform:translateY(5px);box-shadow:0 2px 0 var(--sun-dk);}
.btn.melon{background:var(--melon);box-shadow:0 7px 0 var(--melon-dk);}
.btn.melon:active{box-shadow:0 2px 0 var(--melon-dk);}
.btn.mint{background:var(--mint);box-shadow:0 7px 0 var(--mint-dk);}
.btn.mint:active{box-shadow:0 2px 0 var(--mint-dk);}
.btn.grape{background:var(--grape);box-shadow:0 7px 0 var(--grape-dk);}
.btn.ghost{background:var(--paper);color:var(--ink);box-shadow:0 7px 0 var(--shadow);border:3px solid #EAF2F8;}
.btn.ghost:active{box-shadow:0 2px 0 var(--shadow);}
.btn.small{font-size:18px;padding:11px 16px;border-radius:18px;width:auto;display:inline-block;}
.btn:disabled{opacity:.45;pointer-events:none;}

.guide{display:flex;align-items:flex-end;gap:12px;margin:8px 0 16px;position:relative;z-index:2;}
.facewrap{display:flex;flex-direction:column;align-items:center;gap:2px;flex:0 0 auto;}
.nextegg{text-align:center;cursor:pointer;margin-top:2px;}
.nextegg .eggpct{font-size:11px;color:var(--ink-soft);font-weight:700;margin-top:1px;}
.gameegg{display:inline-flex;flex-direction:column;align-items:center;transform:scale(.72);transform-origin:right center;}
.gameegg .eggpct{font-size:10px;color:var(--ink-soft);font-weight:700;}
.guide .face{font-size:62px;line-height:1;animation:floaty 3s ease-in-out infinite;cursor:pointer;
  filter:drop-shadow(0 6px 0 rgba(58,48,73,.12));position:relative;}
@keyframes floaty{0%,100%{transform:translateY(0);}50%{transform:translateY(-9px);}}
.face.sleep{animation:none;}
.zzz{position:absolute;top:-14px;right:-16px;font-size:22px;animation:zfloat 2.2s ease-in-out infinite;}
@keyframes zfloat{0%{transform:translateY(0);opacity:0;}30%{opacity:1;}100%{transform:translateY(-22px);opacity:0;}}
.bubble{background:var(--paper);border:3px solid #EAF2F8;border-radius:22px;border-bottom-left-radius:6px;
  padding:12px 16px;font-size:19px;box-shadow:0 5px 0 var(--shadow);flex:1;animation:pop .35s ease;}
.bubble b{color:var(--melon);}

.card{background:var(--paper);border:3px solid #EAF2F8;border-radius:26px;box-shadow:0 7px 0 var(--shadow);
  padding:18px;position:relative;z-index:1;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
h1{font-size:32px;text-align:center;margin:6px 0 2px;letter-spacing:1px;}
.famtag{text-align:center;font-size:13px;color:var(--ink-soft);letter-spacing:2px;margin-top:2px;}
h2{font-size:23px;margin-bottom:10px;}
.sub{color:var(--ink-soft);font-size:16px;text-align:center;margin-bottom:14px;}

.opt{background:var(--paper);border:4px solid #EAF2F8;border-radius:26px;cursor:pointer;
  box-shadow:0 7px 0 var(--shadow);padding:16px 8px;text-align:center;
  transition:transform .08s,border-color .15s,background .15s;animation:pop .3s ease backwards;}
.opt:nth-child(2){animation-delay:.06s;}.opt:nth-child(3){animation-delay:.12s;}.opt:nth-child(4){animation-delay:.18s;}
.opt:active{transform:translateY(4px);box-shadow:0 3px 0 var(--shadow);}
.opt .em{font-size:52px;display:block;line-height:1.15;}
.opt .tx{font-size:26px;display:block;margin-top:4px;}
.opt .nm{font-size:15px;color:var(--ink-soft);}
.opt.hg .tx{font-size:44px;}
.opt.good{border-color:var(--mint);background:#EAFBF4;animation:pop2 .4s ease;}
.opt.bad{border-color:var(--melon);animation:shake .4s ease;}
@keyframes pop{from{transform:scale(.6);opacity:0;}to{transform:scale(1);opacity:1;}}
@keyframes pop2{0%{transform:scale(1);}40%{transform:scale(1.12);}100%{transform:scale(1);}}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}

.qbox{text-align:center;margin-bottom:16px;}
.qbox .qbig{font-size:54px;line-height:1.2;}
.qbox .qtx{font-size:22px;margin-top:4px;}
.dots{display:flex;gap:7px;justify-content:center;margin:10px 0 16px;flex-wrap:wrap;}
.dot{width:12px;height:12px;border-radius:50%;background:#DCE9F2;}
.dot.on{background:var(--sun);}
.speaker{font-size:38px;background:none;border:none;cursor:pointer;animation:wiggle 2.5s ease-in-out infinite;}
@keyframes wiggle{0%,88%,100%{transform:rotate(0);}92%{transform:rotate(-12deg);}96%{transform:rotate(12deg);}}

.stage{display:flex;align-items:center;gap:14px;background:var(--paper);border:3px solid #EAF2F8;
  border-radius:24px;box-shadow:0 6px 0 var(--shadow);padding:13px 16px;margin-bottom:11px;cursor:pointer;
  transition:transform .08s;position:relative;z-index:1;}
.stage:active{transform:translateY(3px);}
.stage .se{font-size:40px;}
.stage .sn{font-size:20px;}.stage .sd{font-size:14px;color:var(--ink-soft);}
.stage .fill{flex:1;}
.stage.lock{filter:grayscale(1);opacity:.55;}
.stage.chal{border-color:var(--grape);background:linear-gradient(135deg,#F6F1FF,#fff);}
.stagebadge{font-size:20px;}

/* ---------- eggs ---------- */
.egg{width:64px;height:80px;border-radius:50% 50% 46% 46% / 60% 60% 42% 42%;
  background:#fff;border:3px solid #EDE6D6;position:relative;margin:0 auto;
  box-shadow:inset -6px -8px 0 rgba(0,0,0,.04),0 4px 0 var(--shadow);}
.egg.mini{width:34px;height:43px;border-width:2px;}
.egg .pat{position:absolute;inset:6px;border-radius:inherit;opacity:.75;}
.egg .crk{position:absolute;inset:0;border-radius:inherit;background-repeat:no-repeat;background-size:70% 70%;background-position:center 30%;}
.egg.c1 .crk{background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><polyline points="30,30 42,42 36,56" fill="none" stroke="%23907d61" stroke-width="5" stroke-linecap="round"/></svg>');}
.egg.c2 .crk{background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><polyline points="30,28 42,42 36,58 52,54 58,72" fill="none" stroke="%23907d61" stroke-width="5" stroke-linecap="round"/><polyline points="62,26 56,40 68,46" fill="none" stroke="%23907d61" stroke-width="4" stroke-linecap="round"/></svg>');}
.egg.c2{animation:eggshake 1.6s ease-in-out infinite;}
@keyframes eggshake{0%,84%,100%{transform:rotate(0);}88%{transform:rotate(-7deg);}92%{transform:rotate(7deg);}96%{transform:rotate(-4deg);}}
.egg.tap{animation:eggtap .4s ease;}
@keyframes eggtap{0%,100%{transform:rotate(0) scale(1);}30%{transform:rotate(-9deg) scale(1.06);}60%{transform:rotate(9deg) scale(1.06);}}
.eggslot{text-align:center;padding:8px 4px;}
.eggslot .gz{height:9px;background:#E7EFF5;border-radius:99px;overflow:hidden;margin:6px 4px 2px;}
.eggslot .gz i{display:block;height:100%;background:linear-gradient(90deg,var(--sun),var(--melon));border-radius:99px;}
.eggslot .need{font-size:11px;color:var(--ink-soft);}
.friendslot{text-align:center;padding:8px 4px;animation:pop .3s ease;}
.friendslot .fe{font-size:44px;line-height:1.1;position:relative;display:inline-block;}
.friendslot .wear{position:absolute;font-size:19px;top:-10px;right:-12px;}
.friendslot .ride{position:absolute;font-size:18px;bottom:-6px;right:-14px;}
.friendslot .nm{font-size:12px;color:var(--ink-soft);display:block;margin-top:2px;}
.colgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.pbarwrap{background:#E3EEF6;border-radius:999px;height:20px;overflow:hidden;margin:6px 0 4px;border:3px solid #fff;}
.pbar{height:100%;background:linear-gradient(90deg,var(--sun),var(--melon));border-radius:999px;transition:width .6s ease;}
.pct{font-size:14px;color:var(--ink-soft);text-align:right;}

/* ---------- sentence / story ---------- */
.senslot{min-height:64px;background:rgba(255,255,255,.7);border:3px dashed #C9DDEB;border-radius:20px;
  display:flex;flex-wrap:wrap;gap:8px;padding:10px;margin-bottom:16px;align-items:center;justify-content:center;}
.wchip{background:var(--paper);border:3px solid #EAF2F8;border-radius:16px;box-shadow:0 5px 0 var(--shadow);
  padding:8px 14px;font-size:22px;cursor:pointer;animation:pop .3s ease backwards;}
.wchip:active{transform:translateY(3px);box-shadow:0 2px 0 var(--shadow);}
.wchip.inslot{background:#FFF6DB;border-color:#F4DFA0;box-shadow:0 5px 0 #EAD37E;}
.chippool{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
.storypage{text-align:center;}
.storypage .se{font-size:92px;line-height:1.1;margin:12px 0;animation:floaty 3.4s ease-in-out infinite;display:inline-block;}
.storypage .st{font-size:27px;line-height:1.5;}
.pagenum{color:var(--ink-soft);font-size:15px;margin-top:10px;}

/* ---------- reward / challenge ---------- */
.reward{text-align:center;padding-top:26px;position:relative;z-index:2;}
.reward .big{font-size:96px;animation:pop2 .6s ease;display:inline-block;}
.reward h1{font-size:34px;}
.starrow{font-size:42px;letter-spacing:6px;margin:8px 0;}
.stickercard{display:inline-block;background:var(--paper);border:4px solid var(--sun);border-radius:24px;
  padding:16px 26px;box-shadow:0 7px 0 var(--sun-dk);margin:12px 0;animation:pop .5s ease .3s backwards;}
.stickercard .se{font-size:58px;display:block;}
.stickercard .sn{font-size:17px;color:var(--ink-soft);}
.confetti{position:fixed;top:-20px;font-size:22px;z-index:50;pointer-events:none;animation:cfall linear forwards;}
@keyframes cfall{to{transform:translateY(110vh) rotate(720deg);}}
.micbtn{width:120px;height:120px;border-radius:50%;border:none;background:var(--melon);color:#fff;
  font-size:52px;box-shadow:0 8px 0 var(--melon-dk);cursor:pointer;margin:14px auto;display:block;font-family:inherit;}
.micbtn:active{transform:translateY(5px);box-shadow:0 3px 0 var(--melon-dk);}
.micbtn.listen{animation:pulse 1s ease-in-out infinite;background:var(--mint);box-shadow:0 8px 0 var(--mint-dk);}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
.attempts{font-size:17px;color:var(--ink-soft);margin-top:6px;}
.timerwrap{height:14px;background:#E3EEF6;border-radius:99px;overflow:hidden;margin:12px 0;border:2px solid #fff;}
.word{font-size:48px;font-weight:900;margin:8px 0 14px;letter-spacing:3px;}
.tries{display:flex;justify-content:center;gap:10px;margin:14px 0 10px;}
.try{width:34px;height:34px;border-radius:50%;background:#E3EEF6;display:flex;align-items:center;
  justify-content:center;font-size:16px;color:#9AB2C4;border:2px solid #fff;}
.try.now{background:var(--sun);color:#fff;animation:pop2 .4s ease;}
.try.used{background:#F6D7D7;color:#D98080;}
.timerbar{height:100%;background:linear-gradient(90deg,var(--mint),var(--sun));border-radius:99px;}
@keyframes timerrun{from{width:100%;}to{width:0%;}}

/* ---------- inputs / admin ---------- */
.inp{width:100%;font-family:inherit;font-size:19px;padding:12px 14px;border:3px solid #EAF2F8;
  border-radius:16px;background:#FBFDFF;color:var(--ink);outline:none;margin-bottom:10px;}
.inp:focus{border-color:var(--sun);}
.adminrow{border-bottom:2px dashed #E3EEF6;padding:13px 0;}
.adminrow .nm{font-size:20px;}
.adminrow .meta{font-size:14px;color:var(--ink-soft);margin:4px 0 6px;}
.rowbtns{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.tiny{font-size:14px;padding:7px 12px;border-radius:12px;border:none;font-family:inherit;cursor:pointer;color:#fff;}
.tiny.b1{background:var(--mint);}.tiny.b2{background:var(--grape);}.tiny.b3{background:var(--melon);}
.note{font-size:14px;color:var(--ink-soft);background:#FFF6DB;border:2px solid #F4DFA0;border-radius:14px;
  padding:10px 12px;margin:10px 0;line-height:1.5;}
.center{text-align:center;}.mt{margin-top:14px;}.mb{margin-bottom:14px;}
.fadein{animation:pop .3s ease;}
.padbtns{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px;}
.padbtns button{font-family:inherit;font-size:26px;padding:14px;border-radius:18px;border:3px solid #EAF2F8;
  background:var(--paper);box-shadow:0 5px 0 var(--shadow);cursor:pointer;color:var(--ink);
  animation:pop .25s ease backwards;}
.padbtns button:nth-child(2){animation-delay:.03s;}.padbtns button:nth-child(3){animation-delay:.06s;}
.padbtns button:nth-child(4){animation-delay:.09s;}.padbtns button:nth-child(5){animation-delay:.12s;}
.padbtns button:nth-child(6){animation-delay:.15s;}.padbtns button:nth-child(7){animation-delay:.18s;}
.padbtns button:nth-child(8){animation-delay:.21s;}.padbtns button:nth-child(9){animation-delay:.24s;}
.padbtns button:nth-child(10){animation-delay:.27s;}.padbtns button:nth-child(11){animation-delay:.3s;}
.padbtns button:nth-child(12){animation-delay:.33s;}
.padbtns button:active{transform:translateY(3px);box-shadow:0 2px 0 var(--shadow);}
.pinview{font-size:38px;letter-spacing:12px;text-align:center;min-height:54px;}
.pinview.err{animation:shake .4s ease;color:var(--melon);}
.gtoggle{display:flex;gap:10px;margin-bottom:10px;}
.gtoggle button{flex:1;font-family:inherit;font-size:19px;padding:12px;border-radius:16px;border:3px solid #EAF2F8;
  background:var(--paper);cursor:pointer;color:var(--ink);}
.gtoggle button.sel{border-color:var(--sun);background:#FFF6DB;}
.minibar{height:10px;background:#E7EFF5;border-radius:99px;overflow:hidden;margin:3px 0 7px;}
.minibar i{display:block;height:100%;background:var(--mint);border-radius:99px;}
.mslabel{display:inline-block;background:#EFE9FF;color:var(--grape-dk);border-radius:99px;padding:4px 12px;font-size:14px;margin:4px 0;}

/* ===== 미니게임 공통 ===== */
.scene{position:relative;min-height:340px;border-radius:24px;overflow:hidden;margin-top:10px;padding:14px 10px;}
.scene .drift{position:absolute;font-size:26px;opacity:.5;animation:driftMove 9s linear infinite;pointer-events:none;}
@keyframes driftMove{0%{transform:translateX(-40px);}100%{transform:translateX(420px);}}
.hintline{text-align:center;font-size:15px;color:var(--ink-soft);margin:6px 0 2px;}
/* ===== 풍선 팡팡 ===== */
.sky{background:linear-gradient(#CDEBFF,#EAF7FF);}
.balloonwrap{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;position:relative;z-index:1;}
.balloon{width:132px;text-align:center;cursor:pointer;animation:bSway 3s ease-in-out infinite alternate;}
.balloon:nth-child(2){animation-duration:3.6s;animation-delay:.4s;}
.balloon:nth-child(3){animation-duration:2.7s;animation-delay:.8s;}
.balloon:nth-child(4){animation-duration:3.3s;animation-delay:.2s;}
@keyframes bSway{0%{transform:translateY(0) rotate(-2deg);}100%{transform:translateY(-14px) rotate(2deg);}}
.bbody{width:112px;height:128px;margin:0 auto;border-radius:50% 50% 48% 48%;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:inset -8px -10px 0 rgba(0,0,0,.06),0 4px 10px rgba(0,0,0,.10);border:3px solid rgba(255,255,255,.7);}
.balloon .str{width:2px;height:34px;background:#B9A88F;margin:0 auto;border-radius:2px;}
.balloon .em{font-size:34px;line-height:1;}.balloon .tx{font-size:26px;font-weight:800;}.balloon .nm{font-size:13px;opacity:.75;}
.balloon.popped{animation:bPop .45s ease forwards;}
@keyframes bPop{0%{transform:scale(1);}30%{transform:scale(1.25);}100%{transform:scale(.05);opacity:0;}}
.balloon.boing{animation:bBoing .4s ease;}
@keyframes bBoing{0%,100%{transform:scale(1);}35%{transform:scale(.86) rotate(-5deg);}70%{transform:scale(1.08) rotate(4deg);}}
/* ===== 두더지 콩콩 ===== */
.fieldbg{background:linear-gradient(#DFF3C8,#F4FBE7);}
.holes{display:grid;grid-template-columns:1fr 1fr;gap:12px;position:relative;z-index:1;}
.hole{position:relative;height:150px;overflow:hidden;border-radius:18px;}
.hole::after{content:'';position:absolute;bottom:6px;left:12%;width:76%;height:26px;background:#8B6B4A;border-radius:50%;opacity:.85;}
.mole{position:absolute;left:50%;bottom:8px;transform:translateX(-50%);width:104px;padding:8px 4px 16px;background:#C99B6C;border:3px solid #A97C4F;border-radius:52px 52px 18px 18px;text-align:center;cursor:pointer;animation:peek 3s ease-in-out infinite;z-index:1;}
.hole:nth-child(2) .mole{animation-duration:3.5s;animation-delay:.5s;}
.hole:nth-child(3) .mole{animation-duration:2.7s;animation-delay:1s;}
.hole:nth-child(4) .mole{animation-duration:3.2s;animation-delay:.3s;}
@keyframes peek{0%,100%{transform:translateX(-50%) translateY(64%);}25%,75%{transform:translateX(-50%) translateY(4%);}}
.mole .mf{font-size:22px;}.mole .em{font-size:30px;display:block;}.mole .tx{font-size:25px;font-weight:800;display:block;}.mole .nm{font-size:12px;opacity:.8;display:block;}
.mole.bonk{animation:bonkA .55s ease forwards;}
@keyframes bonkA{0%{transform:translateX(-50%) translateY(4%);}30%{transform:translateX(-50%) translateY(2%) scale(1.15,.75);}100%{transform:translateX(-50%) translateY(10%) scale(1);}}
.mole.duck{animation:duckA .5s ease;}
@keyframes duckA{0%,100%{}50%{transform:translateX(-50%) translateY(85%);}}
/* ===== 신나는 낚시 ===== */
.seabg{background:linear-gradient(#BDE7FF 0%,#8FD0F5 30%,#5FB4E8 100%);}
.fishrow{position:relative;z-index:1;display:flex;flex-direction:column;gap:14px;padding-top:6px;}
.fishy{display:flex;align-items:center;gap:6px;width:max-content;cursor:pointer;animation:swim 3.4s ease-in-out infinite alternate;}
.fishy:nth-child(2){animation-duration:4.1s;animation-delay:.5s;align-self:flex-end;flex-direction:row-reverse;}
.fishy:nth-child(2) .ffish{transform:scaleX(-1);}
.fishy:nth-child(3){animation-duration:3s;animation-delay:.9s;align-self:center;}
.fishy:nth-child(4){animation-duration:3.8s;animation-delay:.2s;}
@keyframes swim{0%{transform:translateX(0) translateY(0);}50%{transform:translateX(40px) translateY(-6px);}100%{transform:translateX(90px) translateY(4px);}}
.ffish{font-size:44px;line-height:1;}
.fbub{background:rgba(255,255,255,.92);border:3px solid #fff;border-radius:16px;padding:6px 12px;box-shadow:0 3px 8px rgba(0,0,0,.12);text-align:center;}
.fbub .em{font-size:26px;}.fbub .tx{font-size:24px;font-weight:800;}.fbub .nm{font-size:12px;opacity:.75;display:block;}
.fishy.hooked{animation:hookA .8s ease forwards;}
@keyframes hookA{0%{}30%{transform:translateY(-30px) rotate(-14deg);}100%{transform:translateY(-240px) rotate(-20deg);opacity:0;}}
.fishy.splash{animation:splashA .45s ease;}

.chests{display:grid;grid-template-columns:1fr 1fr;gap:14px;position:relative;z-index:1;}
.chest{background:#fff;border:3px solid var(--line);border-radius:20px;padding:14px 8px;text-align:center;cursor:pointer;box-shadow:0 4px 0 var(--line);}
.chest .box{font-size:52px;display:block;transition:transform .15s;}
.chest .em{font-size:30px;}.chest .tx{font-size:26px;font-weight:800;display:block;}.chest .nm{font-size:12px;opacity:.75;display:block;}
.chest.knock .box{animation:knockA .3s ease;}
@keyframes knockA{0%,100%{transform:rotate(0);}30%{transform:rotate(-8deg) scale(1.08);}70%{transform:rotate(6deg) scale(1.05);}}
.chest.open{background:var(--mint-soft);border-color:var(--mint);}
.chest.open .box{animation:openA .6s ease;}
@keyframes openA{0%{transform:scale(1);}40%{transform:scale(1.35) rotate(-6deg);}100%{transform:scale(1.15);}}
.chest.puff{animation:puffA .45s ease;}
@keyframes puffA{0%,100%{transform:translateX(0);}25%{transform:translateX(-7px);}60%{transform:translateX(6px);}}
/* ===== 냠냠 먹이 주기 ===== */
.mealbg{background:linear-gradient(#FFEFD9,#FFF9EE);}
.friendbig{font-size:84px;text-align:center;line-height:1.1;animation:hop 1.6s ease-in-out infinite;position:relative;z-index:1;}
@keyframes hop{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.friendbig.chomp{animation:chompA .7s ease;}
@keyframes chompA{0%{transform:scale(1);}25%{transform:scale(1.25,.8);}50%{transform:scale(.9,1.15);}75%{transform:scale(1.1,.95);}100%{transform:scale(1);}}
.friendbig.yuck{animation:yuckA .5s ease;}
@keyframes yuckA{0%,100%{transform:rotate(0);}25%{transform:rotate(-10deg);}75%{transform:rotate(10deg);}}
.foods{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;position:relative;z-index:1;margin-top:14px;}
.foods.two{grid-template-columns:1fr 1fr;}
.food{background:#fff;border:3px solid var(--line);border-radius:18px;padding:12px 6px;text-align:center;cursor:pointer;box-shadow:0 4px 0 var(--line);transition:transform .6s ease,opacity .6s ease;}
.food .em{font-size:34px;display:block;}.food .tx{font-size:24px;font-weight:800;display:block;}.food .nm{font-size:12px;opacity:.75;display:block;}
.food.eaten{transform:translateY(-190px) scale(.25);opacity:0;}
.food.nope{animation:puffA .45s ease;}
/* ===== 반짝 기억 놀이 ===== */
.starbg{background:linear-gradient(#EDE4FF,#FAF6FF);}
.bigletter{font-size:100px;font-weight:800;text-align:center;cursor:pointer;line-height:1.2;user-select:none;position:relative;z-index:1;animation:hop 1.8s ease-in-out infinite;}
.bigletter.gig{animation:gigA .5s ease;}
@keyframes gigA{0%,100%{transform:rotate(0) scale(1);}25%{transform:rotate(-8deg) scale(1.2);}75%{transform:rotate(8deg) scale(1.15);}}
/* ===== 칙칙폭폭 기차 ===== */
.railbg{background:linear-gradient(#DFF0FF,#F3FAFF);}
.trainrow{display:flex;align-items:center;gap:6px;min-height:86px;padding:8px;background:rgba(255,255,255,.7);border-radius:16px;position:relative;z-index:1;overflow-x:auto;transition:transform 1.8s ease-in,opacity 1.8s;}
.trainrow.depart{transform:translateX(-130%);opacity:.2;}
.loco{font-size:48px;flex:0 0 auto;}
.tcar{background:var(--sun-soft);border:3px solid var(--sun);border-radius:12px;padding:8px 12px;font-size:22px;font-weight:800;flex:0 0 auto;cursor:pointer;}
.trainrow.tumble .tcar{animation:puffA .5s ease;}
.rail{height:6px;background:repeating-linear-gradient(90deg,#B9A88F 0 22px,transparent 22px 34px);border-radius:3px;margin-top:2px;position:relative;z-index:1;}


/* ===== 그림 글자 ===== */
.picto{display:block;margin:6px auto 2px;height:76px;max-width:96%;cursor:pointer;}
.picto.mini{height:36px;margin:2px auto;cursor:inherit;}
.picto.gig{animation:gigA .5s ease;}

const state={screen:'profiles',user:null,theme:'animal',stage:null,game:null,chal:null,
  sound:true,gate:null,queue:[],rewardInfo:null,greeted:false};
function prog(){
  if(!DB.progress[state.user])DB.progress[state.user]=
    {theme:'animal',themeChosen:false,countries:{},trackOrder:[],
     daily:{date:today(),used:0},speech:{p1:0,p2:0,p3:0,ear:0},last:null};
  const p=DB.progress[state.user];
  if(!p.countries)p.countries={};if(!p.trackOrder)p.trackOrder=[];
  if(!p.daily)p.daily={date:today(),used:0};
  if(!p.speech)p.speech={p1:0,p2:0,p3:0,ear:0};
  return p;
}
function cprog(c){
  const p=prog();c=c||state.theme;
  if(!p.countries[c])p.countries[c]={stars:0,done:[],reviews:{},challenges:{},badge:false};
  const cp=p.countries[c];
  if(!cp.reviews)cp.reviews={};if(!cp.done)cp.done=[];if(!cp.challenges)cp.challenges={};
  return cp;
}
function daily(){
  const p=prog();
  if(p.daily.date!==today()){p.daily={date:today(),used:0};}
  return p.daily;
}
function trackOf(c){return prog().trackOrder.indexOf(c);}
function unlockedInTrack(ti){
  const c=prog().trackOrder[ti];if(c===undefined)return 0;
  const s=cprog(c).stars;let n=0;
  for(let k=1;k<=12;k++){if(s>=thresh(k,ti))n++;}
  return n;
}
function hatchedCount(){return prog().trackOrder.length>0?Math.max(1,unlockedInTrack(0)):1;}

let VOICES=[];
function loadVoices(){
  try{VOICES=speechSynthesis.getVoices()||[];}catch(e){VOICES=[];}
}
function koVoices(){
  return VOICES.filter(v=>/ko(-|_)?KR|Korean|한국/i.test(v.lang+' '+v.name));
}
function pickVoice(){
  const want=DB.voiceURI;
  if(want){const v=VOICES.find(v=>v.voiceURI===want);if(v)return v;}
  const ko=koVoices();
  if(!ko.length)return null;
  /* 이름에 자연스러운 음성 키워드가 있으면 우선 (기기별로 다름) */
  const pref=ko.find(v=>/(Yuna|유나|Nari|나리|natural|Neural|Premium|Enhanced|Google)/i.test(v.name));
  return pref||ko[0];
}
function utter(t,pitch,rate,cancel){
  if(!state.sound)return;
  try{const u=new SpeechSynthesisUtterance(t);
    const v=pickVoice();
    if(v){u.voice=v;u.lang=v.lang;}else{u.lang='ko-KR';}
    u.pitch=pitch;u.rate=rate;
    if(cancel)speechSynthesis.cancel();
    speechSynthesis.speak(u);}catch(e){}
}
/* 낱말·글자 발음: 왜곡 없이 또렷하게 */
function speak(t){utter(t,1.0,0.88,true);}
/* 캐릭터 수다: 친구마다 다른 음색. cancel=false면 앞말 끝나고 이어 말함 */
function speakAs(fi,t,cancel){
  const f=FRIENDS[fi]||FRIENDS[0];const vp=f.vp||{p:1.1,r:1.0};
  utter(t,vp.p,vp.r,cancel!==false);
}
function gfi(){return hatchedCount()-1;}
let AC=null;
function tone(f,d,delay,type,g){
  if(!state.sound)return;
  try{AC=AC||new (window.AudioContext||window.webkitAudioContext)();
    const o=AC.createOscillator(),v=AC.createGain();
    o.type=type||'sine';o.frequency.value=f;o.connect(v);v.connect(AC.destination);
    const s=AC.currentTime+(delay||0);const gg=g||0.12;
    v.gain.setValueAtTime(gg,s);v.gain.exponentialRampToValueAtTime(0.001,s+d);
    o.start(s);o.stop(s+d);}catch(e){}
}

function pictoStageOK(){const g=state.game;if(!g)return false;return parseInt(g.mid.slice(1))<=3;}
function pictoHTML(word,mini){
  const p=PICTO[word];if(!p||!pictoStageOK())return null;
  return `<svg class="picto${mini?' mini':''}" viewBox="0 0 ${p.w} 100" data-pw="${word}" xmlns="http://www.w3.org/2000/svg">${p.s}</svg>`;
}
function bindPicto(){
  document.querySelectorAll('.qbox .picto').forEach(el=>{
    el.onclick=ev=>{ev.stopPropagation();sfxClick();
      const w=el.dataset.pw;el.classList.remove('gig');void el.getBoundingClientRect();el.classList.add('gig');
      speak(w);speakAs(gfi(),PICTO[w].h,false);};
  });
}
function eggHTML(fi,pct,mini){
  const f=FRIENDS[fi];
  const cls='egg'+(mini?' mini':'')+(pct>=80?' c2':(pct>=50?' c1':''));
  return '<div class="'+cls+'"><div class="pat" style="background:'+f.pat+';background-color:transparent;"></div><div class="crk"></div></div>';
}
/* 다음 알 미리보기: 별이 없어도 항상 표시 (0%). 홈·게임 공용. */
function nextEggWidget(mini){
  const p=prog();const fc=hatchedCount();const nextIdx=fc<12?fc:null;
  if(nextIdx===null)return '';
  const firstC=p.trackOrder[0];
  const s=firstC?cprog(firstC).stars:0;
  const need=thresh(nextIdx+1,0);
  const pct=need<=0?100:Math.min(99,Math.floor(s/need*100));
  const left=Math.max(0,need-s);
  return `<div class="nextegg" id="nextEgg" title="다음 친구의 알">
    ${eggHTML(nextIdx,pct,mini!==false)}
    <div class="eggpct">${left>0?('⭐'+left):'곧 부화!'}</div></div>`;
}

/* ---------------- QUESTION GENERATORS (38 missions) ---------------- */
function genQuestions(mid,tk){
  const T=THEMES[tk];const W=T.words;
  const other=(w,n,f)=>pick(W.filter(x=>x.w!==w.w&&(!f||f(x))),n);
  /* --- stage 1 --- */
  if(mid==='s1m1')return pick(W,5).map(w=>{
    const opts=shuffle([w,...other(w,3)]);
    return{type:'choice',prompt:{big:'🔊'},speak:w.w+'! '+w.w+'는 어디 있을까?',
      opts:opts.map(o=>({emoji:o.e})),answer:opts.indexOf(w),say:w.w};});
  if(mid==='s1m2')return pick(W,5).map(w=>{
    const set=new Set([w.w.length]);while(set.size<3)set.add(1+Math.floor(Math.random()*4));
    const opts=shuffle([...set]);
    return{type:'choice',prompt:{big:w.e,text:w.w},
      speak:w.w+'! 몇 번 박수 칠까? '+w.w.split('').join(', '),
      opts:opts.map(n=>({text:'👏'.repeat(n),sub:n+'번'})),
      answer:opts.indexOf(w.w.length),say:w.w+'는 '+w.w.length+'글자!'};});
  /* --- stage 2 --- */
  if(mid==='s2m1')return pick(W.filter(w=>w.w.length<=3),5).map(w=>{
    const set=new Set([w.w.length]);while(set.size<3)set.add(1+Math.floor(Math.random()*4));
    const opts=shuffle([...set]);
    return{type:'choice',prompt:{big:w.e,text:w.w},
      speak:w.w+'! 몇 번 박수 칠까? '+w.w.split('').join(', '),
      opts:opts.map(n=>({text:'👏'.repeat(n),sub:n+'번'})),
      answer:opts.indexOf(w.w.length),say:w.w+'는 '+w.w.length+'글자!'};});
  if(mid==='s2m2'){const qs=[];
    for(const a of shuffle(W)){if(qs.length>=5)break;
      const bs=W.filter(x=>x.w.length<a.w.length);if(!bs.length)continue;
      const b=bs[Math.floor(Math.random()*bs.length)];
      const opts=shuffle([a,b]);
      qs.push({type:'choice',prompt:{text:'더 긴 낱말은 어느 것일까?'},
        speak:'더 긴 낱말을 찾아 줘! '+a.w+', 그리고 '+b.w+'!',
        opts:opts.map(o=>({emoji:o.e,text:o.w})),answer:opts.indexOf(a),say:a.w+'가 더 길어!'});}
    return qs;}
  if(mid==='s2m3'){const qs=[];
    for(const w of shuffle(W)){if(qs.length>=5)break;
      const same=W.filter(x=>x.w!==w.w&&x.w.length===w.w.length);
      const diff=W.filter(x=>x.w.length!==w.w.length);
      if(!same.length||diff.length<2)continue;
      const c=same[0];const opts=shuffle([c,...pick(diff,2)]);
      qs.push({type:'choice',prompt:{big:w.e,text:'「'+w.w+'」와 글자 수가 같은 낱말은?'},
        speak:w.w+'는 '+w.w.length+'글자! 글자 수가 같은 낱말을 찾아 줘!',
        opts:opts.map(o=>({emoji:o.e,text:o.w})),answer:opts.indexOf(c),say:c.w+'도 '+w.w.length+'글자!'});}
    return qs;}
  /* --- stage 3 --- */
  if(mid==='s3m1'){const qs=[];const used=new Set();
    for(const w of shuffle(W)){if(qs.length>=5)break;
      const syl=w.w[Math.floor(Math.random()*w.w.length)];
      if(used.has(syl))continue;
      const wrong=W.filter(x=>x.w!==w.w&&!x.w.includes(syl));
      if(wrong.length<2)continue;used.add(syl);
      const opts=shuffle([w,...pick(wrong,2)]);
      qs.push({type:'choice',prompt:{big:syl,text:'이 글자가 숨어 있는 낱말은?'},
        speak:syl+'! '+syl+' 글자가 숨어 있는 낱말을 찾아 줘!',
        opts:opts.map(o=>({emoji:o.e,text:o.w})),answer:opts.indexOf(w),say:w.w+' 안에 '+syl+'!'});}
    return qs;}
  if(mid==='s3m2'){const qs=[];
    for(const w of shuffle(W)){if(qs.length>=5)break;
      const syl=w.w[0];const wrong=W.filter(x=>x.w[0]!==syl);
      if(wrong.length<2)continue;
      const opts=shuffle([w,...pick(wrong,2)]);
      qs.push({type:'choice',prompt:{big:syl,text:'「'+syl+'」로 시작하는 낱말은?'},
        speak:syl+'! '+syl+'로 시작하는 낱말을 찾아 줘!',
        opts:opts.map(o=>({emoji:o.e,text:o.w})),answer:opts.indexOf(w),say:w.w+'! '+syl+'로 시작!'});}
    return qs;}
  if(mid==='s3m3'){const qs=[];
    for(const w of shuffle(W)){if(qs.length>=5)break;
      const syl=w.w[w.w.length-1];const wrong=W.filter(x=>x.w[x.w.length-1]!==syl);
      if(wrong.length<2)continue;
      const opts=shuffle([w,...pick(wrong,2)]);
      qs.push({type:'choice',prompt:{big:syl,text:'「'+syl+'」로 끝나는 낱말은?'},
        speak:syl+'! '+syl+'로 끝나는 낱말을 찾아 줘!',
        opts:opts.map(o=>({emoji:o.e,text:o.w})),answer:opts.indexOf(w),say:w.w+'! '+syl+'로 끝나요!'});}
    return qs;}
  if(mid==='s3m4')return pick(W,5).map(w=>{
    const o2=other(w,1)[0];
    const opts=shuffle([{t:w.w,ok:false},{t:w.w,ok:false},{t:o2.w,ok:true}]);
    return{type:'choice',prompt:{text:'다른 낱말 하나를 찾아 줘!'},
      speak:'셋 중에 다른 낱말 하나가 숨어 있어! 찾아 줘!',
      opts:opts.map(o=>({text:o.t})),answer:opts.findIndex(o=>o.ok),say:o2.w+'만 달랐어!'};});
  /* --- stage 4 --- */
  if(mid==='s4m1')return shuffle(VOWELS).map(v=>{
    const opts=shuffle([v,...pick(VOWELS.filter(x=>x.l!==v.l),2)]);
    return{type:'choice',prompt:{big:'🔊',text:'「'+v.s+'」 소리 글자는?'},
      speak:v.s+'! '+v.s+'! 이 소리 글자를 찾아 줘!',
      opts:opts.map(o=>({text:o.l})),hg:true,answer:opts.indexOf(v),say:v.l+'는 '+v.s+'!'};});
  if(mid==='s4m2')return shuffle(VOWELS).map(v=>{
    const opts=shuffle([v,...pick(VOWELS.filter(x=>x.l!==v.l),2)]);
    return{type:'choice',prompt:{big:v.l,text:'이 글자는 무슨 소리일까?'},
      speak:'이 글자는 무슨 소리일까? 골라 봐!',
      opts:opts.map(o=>({text:o.s})),answer:opts.indexOf(v),say:v.l+'는 '+v.s+'!'};});
  if(mid==='s4m3')return shuffle(VOWELS).map(v=>{
    const opts=shuffle([v,...pick(VOWELS.filter(x=>x.l!==v.l),2)]);
    return{type:'choice',prompt:{big:v.s,text:'짝꿍 모음 글자를 찾아 줘!'},
      speak:v.s+'의 짝꿍 글자를 찾아 줘!',
      opts:opts.map(o=>({text:o.l})),hg:true,answer:opts.indexOf(v),say:v.s+'랑 '+v.l+'는 짝꿍!'};});
  if(mid==='s4m4')return shuffle(VOWELS).map(v=>{
    const opts=shuffle([v,...pick(VOWELS.filter(x=>x.l!==v.l),2)]);
    return{type:'flash',flash:v.l,prompt:{text:'방금 본 글자는 어느 것?'},
      speak:'잘 봐! 곧 사라진다!',
      opts:opts.map(o=>({text:o.l})),hg:true,answer:opts.indexOf(v),say:v.l+'! 기억력 최고!'};});
  if(mid==='s4m5'){
    const bank=[];const seen=new Set();
    for(const w of W.concat(GENERIC_V)){
      for(const ch of w.w){const d=decompose(ch);
        if(d&&d.jong===0&&VOWELS.some(v=>v.l===d.jung)&&!seen.has(w.w)){
          bank.push({w:w.w,e:w.e,syl:ch,v:d.jung});seen.add(w.w);break;}}}
    return pick(bank,5).map(b=>{
      const vv=VOWELS.find(v=>v.l===b.v);
      const opts=shuffle([vv,...pick(VOWELS.filter(x=>x.l!==b.v),2)]);
      return{type:'choice',prompt:{big:b.e,text:'「'+b.syl+'」에 숨은 모음은? ('+b.w+')'},
        speak:b.w+'의 '+b.syl+'! 어떤 모음이 숨어 있을까?',
        opts:opts.map(o=>({text:o.l})),hg:true,answer:opts.indexOf(vv),say:b.syl+' 안에 '+b.v+'!'};});}
  /* --- stage 5 --- */
  if(mid==='s5m1')return shuffle(CVS).map(c=>{
    const opts=shuffle([c,...pick(CVS.filter(x=>x.l!==c.l),2)]);
    return{type:'choice',prompt:{big:'🔊',text:'「'+c.l+'」 소리 글자는?'},
      speak:c.l+'! '+c.l+'! 이 소리 글자를 찾아 줘!',
      opts:opts.map(o=>({text:o.l})),hg:true,answer:opts.indexOf(c),say:c.l+'! 찾았다!'};});
  if(mid==='s5m2')return shuffle(CVS).map(c=>{
    const o2=pick(CVS.filter(x=>x.l!==c.l),1)[0];
    const opts=shuffle([{t:c.l,ok:false},{t:c.l,ok:false},{t:o2.l,ok:true}]);
    return{type:'choice',prompt:{text:'다른 글자 하나를 찾아 줘!'},
      speak:'셋 중에 다른 글자 하나! 어디 있을까?',
      opts:opts.map(o=>({text:o.t})),hg:true,answer:opts.findIndex(o=>o.ok),say:o2.l+'만 달랐어!'};});
  if(mid==='s5m3')return shuffle(ONSETS).map(b=>{
    const opts=shuffle([b.o,...pick(CVS.filter(x=>x.l!==b.o).map(x=>x.l),2)]);
    return{type:'choice',prompt:{big:b.e,text:'「'+b.w+'」의 첫소리는?'},
      speak:b.w+'! '+b.w+'는 어떤 소리로 시작할까?',
      opts:opts.map(o=>({text:o})),hg:true,answer:opts.indexOf(b.o),say:b.w+'는 '+b.o+'로 시작!'};});
  if(mid==='s5m4')return shuffle(CVS).map(c=>{
    const opts=shuffle([c,...pick(CVS.filter(x=>x.l!==c.l),2)]);
    return{type:'flash',flash:c.l,prompt:{text:'방금 본 글자는 어느 것?'},
      speak:'잘 봐! 곧 사라진다!',
      opts:opts.map(o=>({text:o.l})),hg:true,answer:opts.indexOf(c),say:c.l+'! 기억했구나!'};});
  if(mid==='s5m5')return shuffle(CVS).map(c=>{
    const opts=shuffle([c,...pick(CVS.filter(x=>x.l!==c.l),3)]);
    return{type:'choice',prompt:{big:'⚡',text:'빨리빨리! 「'+c.l+'」를 찾아라!'},
      speak:'빨리빨리! '+c.l+'! '+c.l+'를 찾아라!',
      opts:opts.map(o=>({text:o.l})),hg:true,answer:opts.indexOf(c),say:'번개처럼 빨랐어!'};});
  /* --- stage 6 --- */
  if(mid==='s6m1')return shuffle(COMBOS).map(c=>{
    const opts=shuffle([c.r,...pick(COMBOS.filter(x=>x.r!==c.r).map(x=>x.r),2)]);
    return{type:'choice',prompt:{big:c.c+' + '+c.v+' = ?',text:'글자를 조립하면?'},
      speak:'두 글자를 붙이면 어떤 글자가 될까?',
      opts:opts.map(o=>({text:o})),hg:true,answer:opts.indexOf(c.r),say:c.r+'! '+c.c+' 더하기 '+c.v+'는 '+c.r+'!'};});
  if(mid==='s6m2')return shuffle(COMBOS).map(c=>{
    const wrong=pick(COMBOS.filter(x=>x.r!==c.r),2).map(x=>x.c+' + '+x.v);
    const right=c.c+' + '+c.v;const opts=shuffle([right,...wrong]);
    return{type:'choice',prompt:{big:c.r,text:'무엇과 무엇으로 만들었을까?'},
      speak:c.r+'! 무엇과 무엇을 붙여 만들었을까?',
      opts:opts.map(o=>({text:o})),answer:opts.indexOf(right),say:c.r+'는 '+c.c+' 더하기 '+c.v+'!'};});
  if(mid==='s6m3')return shuffle(COMBOS).map(c=>{
    const opts=shuffle([c.v,...pick(VOWELS.filter(x=>x.l!==c.v).map(x=>x.l),2)]);
    return{type:'choice',prompt:{big:c.c+' + ❓ = '+c.r,text:'빠진 모음은?'},
      speak:c.r+'를 만들려면 무엇이 빠졌을까?',
      opts:opts.map(o=>({text:o})),hg:true,answer:opts.indexOf(c.v),say:c.v+'가 빠졌었네!'};});
  if(mid==='s6m4')return shuffle(COMBOS).map(c=>{
    const opts=shuffle([c.c,...pick(COMBOS.filter(x=>x.c!==c.c).map(x=>x.c),2)]);
    return{type:'choice',prompt:{big:'❓ + '+c.v+' = '+c.r,text:'빠진 자음은?'},
      speak:c.r+'를 만들려면 무엇이 빠졌을까?',
      opts:opts.map(o=>({text:o})),hg:true,answer:opts.indexOf(c.c),say:c.c+'가 빠졌었네!'};});
  if(mid==='s6m5')return shuffle(COMBOS).map(c=>{
    const opts=shuffle([c.r,...pick(COMBOS.filter(x=>x.r!==c.r).map(x=>x.r),2)]);
    return{type:'choice',prompt:{big:c.word.e,text:'「❓'+c.word.w.slice(1)+'」 첫 글자를 조립! ('+c.c+' + '+c.v+')'},
      speak:c.word.w+'의 첫 글자를 만들어 줘! '+c.c+' 더하기 '+c.v+'!',
      opts:opts.map(o=>({text:o})),hg:true,answer:opts.indexOf(c.r),say:c.r+'! '+c.word.w+' 완성!'};});
  /* --- stage 7 --- */
  if(mid==='s7m1')return pick(BATCHIM,5).map(b=>{
    const opts=shuffle(b.o);
    return{type:'choice',prompt:{big:b.e,text:'「'+b.w+'」 글자는?'},
      speak:b.w+'! '+b.w+'! 받침이 있는 글자를 찾아 줘!',
      opts:opts.map(o=>({text:o})),hg:true,answer:opts.indexOf(b.w),say:b.w+'! 받침 찾기 성공!'};});
  if(mid==='s7m2'){
    const mix=shuffle([...pick(BATCHIM,3).map(b=>({w:b.w,e:b.e,yes:true})),
                       ...pick(NOBAT,2).map(b=>({w:b.w,e:b.e,yes:false}))]);
    return mix.map(m=>{
      const opts=m.yes?['받침 있다!','받침 없다!']:['받침 없다!','받침 있다!'];
      const so=shuffle(opts.map((t,i)=>({t,ok:i===0})));
      return{type:'choice',prompt:{big:m.e,text:'「'+m.w+'」 받침이 있을까 없을까?'},
        speak:m.w+'! 받침이 있을까, 없을까?',
        opts:so.map(o=>({text:o.t})),answer:so.findIndex(o=>o.ok),
        say:m.w+'는 받침이 '+(m.yes?'있어!':'없어!')};});}
  if(mid==='s7m3')return pick(BATCHIM,5).map(b=>{
    const pool=['ㅁ','ㄴ','ㄹ','ㅇ'].filter(x=>x!==b.b);
    const opts=shuffle([b.b,...pick(pool,2)]);
    return{type:'choice',prompt:{big:b.base+' + ❓ = '+b.w,text:'빠진 받침은?'},
      speak:b.base+'에 무엇을 붙이면 '+b.w+'가 될까?',
      opts:opts.map(o=>({text:o})),hg:true,answer:opts.indexOf(b.b),say:b.b+' 받침! '+b.w+' 완성!'};});
  if(mid==='s7m4')return pick(BATCHIM,5).map(b=>{
    const opts=shuffle(b.o);
    return{type:'choice',prompt:{big:'🔊',text:'소리를 듣고 글자를 찾아 줘!'},
      speak:b.w+'! '+b.w+'!',
      opts:opts.map(o=>({text:o})),hg:true,answer:opts.indexOf(b.w),say:b.w+'! 귀가 밝구나!'};});
  if(mid==='s7m5'){const qs=[];
    for(let i=0;i<5;i++){
      const y=BATCHIM[i%BATCHIM.length];const ns=pick(NOBAT,2);
      const opts=shuffle([{w:y.w,e:y.e,ok:true},...ns.map(n=>({w:n.w,e:n.e,ok:false}))]);
      qs.push({type:'choice',prompt:{text:'받침이 있는 낱말을 찾아 줘!'},
        speak:'받침이 콩 하고 붙어 있는 낱말은 어느 것일까?',
        opts:opts.map(o=>({emoji:o.e,text:o.w})),answer:opts.findIndex(o=>o.ok),say:y.w+'! 받침 발견!'});}
    return qs;}
  /* --- stage 8 --- */
  if(mid==='s8m1')return T.sentences.map(s=>({type:'sentence',words:s.s,emoji:s.e,
    speak:'낱말을 눌러서 문장을 만들어 줘! '+s.s.join(' ')}));
  if(mid==='s8m2')return shuffle(T.sentences).map(s=>{
    const wrong=pick(T.sentences.filter(x=>x.e!==s.e),2);
    const opts=shuffle([s,...wrong]);
    return{type:'choice',prompt:{text:'「'+s.s.join(' ')+'」 맞는 그림은?'},
      speak:s.s.join(' ')+'! 맞는 그림을 찾아 줘!',
      opts:opts.map(o=>({emoji:o.e})),answer:opts.indexOf(s),say:'문장을 읽었구나! 최고!'};});
  if(mid==='s8m3')return shuffle(T.sentences).map(s=>{
    const mids=T.sentences.map(x=>x.s[1]);
    const opts=shuffle([s.s[1],...pick(mids.filter(m=>m!==s.s[1]),2)]);
    return{type:'choice',prompt:{big:s.e,text:s.s[0]+' ❓ '+s.s[2]},
      speak:s.s[0]+', 무엇, '+s.s[2]+'! 빈칸에 들어갈 말은?',
      opts:opts.map(o=>({text:o})),answer:opts.indexOf(s.s[1]),say:s.s.join(' ')+'!'};});
  if(mid==='s8m4')return shuffle(T.sentences).map(s=>{
    const right=s.s.join(' ');
    let wrongArr=shuffle(s.s);while(wrongArr.join(' ')===right)wrongArr=shuffle(s.s);
    const opts=shuffle([{t:right,ok:true},{t:wrongArr.join(' '),ok:false}]);
    return{type:'choice',prompt:{big:s.e,text:'바른 문장은 어느 것일까?'},
      speak:'두 문장 중에 바른 문장을 찾아 줘!',
      opts:opts.map(o=>({text:o.t})),answer:opts.findIndex(o=>o.ok),say:right+'! 바른 문장!'};});
  if(mid==='s8m5')return shuffle(T.sentences).map(s=>{
    const subj=s.s[0].replace(/[가이]$/,'');
    const wrong=pick(W.filter(x=>x.w!==subj),2);
    const opts=shuffle([{w:subj,e:s.e},...wrong]);
    return{type:'choice',prompt:{text:s.s[1]+' '+s.s[2]+'! 누구일까요?'},
      speak:s.s[1]+' '+s.s[2]+'! 누구일까요?',
      opts:opts.map(o=>({emoji:o.e,text:o.w})),answer:opts.findIndex(o=>o.w===subj),say:subj+'! 정답!'};});
  /* --- stage 9 --- */
  if(mid==='s9m1')return[{type:'story',story:T.stories[0]}];
  if(mid==='s9m2')return[{type:'story',story:T.stories[1]}];
  if(mid==='s9m3')return[{type:'story',story:T.stories[2]}];
  if(mid==='s9m4')return[{type:'story',story:T.stories[3]}];
  return[];
}
/* ---------------- CHALLENGE WORD SETS ---------------- */
function challengeItems(stageId,tk){
  const T=THEMES[tk];
  if(stageId<=3)return pick(T.words,3).map(w=>({word:w.w,e:w.e}));
  if(stageId===4)return pick(VOWELS,3).map(v=>({word:v.s,e:'🎵'}));
  if(stageId===5)return pick(CVS,3).map(c=>({word:c.l,e:'🔔'}));
  if(stageId===6)return pick(COMBOS,3).map(c=>({word:c.r,e:'🏭'}));
  if(stageId===7)return pick(BATCHIM,3).map(b=>({word:b.w,e:b.e}));
  if(stageId===8){const s=pick(T.sentences,1)[0];
    return[{word:s.s[0],e:s.e},{word:s.s[1],e:'💬'},{word:s.s.join(' '),e:'📝',sentence:true}];}
  return pick(T.words,2).map(w=>({word:w.w,e:w.e}))
    .concat([{word:T.stories[0].title,e:'📖'}]);
}

/* ---------------- GAME ENGINE ---------------- */
function startMission(mid){
  const cp=cprog();
  const isFirst=!cp.done.includes(mid);
  if(isFirst&&daily().used>=DAILY_LIMIT){go('sleep');return;}
  const qs=genQuestions(mid,state.theme);
  if(!qs.length){speak('이 놀이는 준비 중이야!');return;}
  /* 6단계(글자 공장)부터: 글자가 있는 보기에서 그림 단서 제거 → 순수 글자 읽기 */
  const stageNum=parseInt(mid.slice(1));
  if(stageNum>=6)qs.forEach(q=>{
    if(q.type==='choice')q.opts.forEach(o=>{if(o.text&&o.emoji)delete o.emoji;});
  });
  state.game={mid,qs,i:0,lock:false,sen:null,storyPage:0,streak:0,flashDone:false,flashTimer:null,meetTaps:0,isFirst};
  go('game');
}
function gameHeader(){
  const g=state.game;
  const dots=g.qs.map((_,i)=>`<span class="dot${i<=g.i?' on':''}"></span>`).join('');
  return`<div class="top"><button class="iconbtn" id="quitBtn">←</button>
    <span class="chip">📌 ${MISSIONS[g.mid].name}</span>
    <span class="spacer"></span>
    <span class="chip">⭐ ${cprog().stars}</span>
    <div class="gameegg">${nextEggWidget(true)}</div></div>
    <div class="dots">${dots}</div>`;
}
function bindQuit(){$('#quitBtn').onclick=()=>{sfxClick();
  const g=state.game;if(g&&g.flashTimer)clearTimeout(g.flashTimer);
  try{speechSynthesis.cancel();}catch(e){}go('stage');};}
function rGame(){
  const g=state.game;const q=g.qs[g.i];
  if(!q)return finishMission();
  const M=MISSIONS[g.mid];
  if(q.type==='sentence')return rTrain(q);
  if(q.type==='story')return rStory(q);
  if(q.type==='flash')return rMeet(q);
  const E={feed:rFeed,pop:rPop,mole:rMole,fish:rFish,crack:rCrack};
  return (E[M.eng]||rPop)(q);
}
function optInner(o,hg){
  const pic=o.text?pictoHTML(o.text,true):null;
  return (o.emoji?`<span class="em">${o.emoji}</span>`:'')+
    (pic?pic:(o.text?`<span class="tx"${hg?' style="font-size:36px;"':''}>${o.text}</span>`:''))+
    (o.sub?`<span class="nm">${o.sub}</span>`:'');
}
function drifts(ems){return ems.map((e,i)=>`<span class="drift" style="top:${10+i*26}%;animation-delay:${i*2.4}s;animation-duration:${8+i*3}s;">${e}</span>`).join('');}
function promptBox(q){
  const pic=q.prompt.text?pictoHTML(q.prompt.text,false):null;
  return `<div class="qbox" style="padding:12px;">
    ${q.prompt.big?`<div class="qbig" style="font-size:44px;">${q.prompt.big}</div>`:''}

function miniOK(q){
  const g=state.game;if(g.lock)return false;g.lock=true;g.streak++;sfxGood();

/* ---------------- FINISH / REWARDS / HATCH QUEUE ---------------- */
function collectUnlocks(country,fn){
  const p=prog();
  if(!p.trackOrder.includes(country)&&fn)p.trackOrder.push(country);
  const ti=trackOf(country);
  const before=ti>=0?unlockedInTrack(ti):0;
  fn&&fn();
  const after=ti>=0?unlockedInTrack(ti):(trackOf(country)>=0?unlockedInTrack(trackOf(country)):0);
  const ti2=trackOf(country);
  const items=[];
  for(let k=before+1;k<=after;k++)items.push({type:'ceremony',track:ti2,idx:k-1});
  return items;
}
function finishMission(){
  const g=state.game;const cp=cprog();const mid=g.mid;const p=prog();
  let stars=0,firstTime=false,reviewFull=false;
  const newItems=[];
  if(!cp.done.includes(mid)){
    firstTime=true;stars=3;
    newItems.push(...collectUnlocks(state.theme,()=>{cp.done.push(mid);cp.stars+=3;}));
    daily().used++;
  }else{
    const rv=cp.reviews[mid]||0;
    if(rv<3){cp.reviews[mid]=rv+1;stars=1;
      newItems.push(...collectUnlocks(state.theme,()=>{cp.stars+=1;}));}
    else reviewFull=true;
  }
  saveDB();
  /* 다음 보상 임박 예고: 별 3개 이내로 다가오면 알려주기 */
  let soon=null;
  const ti=trackOf(state.theme);
  if(ti>=0){
    const un=unlockedInTrack(ti);
    if(un<12){
      const left=thresh(un+1,ti)-cp.stars;
      if(left>0&&left<=3){

function onlyHangul(s){return (s||'').replace(/[^가-힣]/g,'');}
function judgeSpeech(said,target,attempt){
  const t=onlyHangul(target),h=onlyHangul(said);
  if(attempt>=3)return h.length>0;               /* 소리(말)만 냈다면 통과 */
  if(attempt===2){                                /* 아주 느슨하게 */
    if(h.length===0)return false;
    if(Math.abs(h.length-t.length)<=1)return true;
    for(const ch of h)if(t.includes(ch))return true;
    return false;
  }
  const tol=t.length<=3?0:(t.length<=5?1:2);      /* 1차: 음절 수 일치 */
  return h.length>0&&Math.abs(h.length-t.length)<=tol;
}
function chalItem(){const c=state.chal;return c.items[c.idx];}

     <div class="tries">${[1,2,3].map(n=>`<span class="try ${n<c.attempt?'used':(n===c.attempt?'now':'')}">${n<c.attempt?'✖':(n===c.attempt?'❗':'○')}</span>`).join('')}</div>
     <button class="micbtn" id="mic">🎤</button>
     <div class="sub" id="micMsg">단추를 누르고 말해 봐!</div>
   </div>`;
  $('#bk').onclick=()=>{sfxClick();go('stage');};

function startListening(){
  const c=state.chal;if(c.busy)return;c.busy=true;c.heard=false;
  const mic=$('#mic'),msg=$('#micMsg');
  let rec;
  try{rec=new SR();}catch(e){switchToEar();return;}
  rec.lang='ko-KR';rec.interimResults=false;rec.maxAlternatives=4;
  mic.classList.add('listen');msg.textContent='듣고 있어요... 크게 말해 봐! 👂';
  let finished=false;
  const finish=(said)=>{
    if(finished)return;finished=true;c.busy=false;
    mic&&mic.classList.remove('listen');
    const it=chalItem();
    const alts=Array.isArray(said)?said:[said||''];
    const pass=alts.some(a=>judgeSpeech(a,it.word,c.attempt))||(c.attempt>=3&&c.heard);
    if(pass)chalPass();else chalFail();
  };
  rec.onspeechstart=()=>{c.heard=true;};
  rec.onaudiostart=()=>{};
  rec.onresult=(ev)=>{
    const alts=[];const res=ev.results[0];
    for(let i=0;i<res.length;i++)alts.push(res[i].transcript);
    finish(alts);
  };
  rec.onerror=(ev)=>{
    if(ev.error==='not-allowed'||ev.error==='service-not-allowed'){finished=true;c.busy=false;switchToEar();return;}
    finish('');
  };
  rec.onend=()=>{finish('');};
  try{rec.start();}catch(e){c.busy=false;switchToEar();}
  setTimeout(()=>{try{rec.stop();}catch(e){}},7000);
}

const MILESTONES=[
  {min:1,max:3,label:'음절 인식 단계',desc:'낱말을 통째로 알아보고 소리 덩어리를 느끼는 시기'},
  {min:4,max:5,label:'글자 소리 익히기 단계',desc:'모음·자음 소리와 글자를 연결하는 시기'},
  {min:6,max:7,label:'글자 조립 단계',desc:'자음+모음을 붙여 새 글자를 만드는 시기'},
  {min:8,max:8,label:'문장 읽기 단계',desc:'짧은 문장을 순서대로 읽는 시기'},
  {min:9,max:9,label:'책 읽기 단계',desc:'짧은 이야기를 스스로 읽는 시기'}];
function stageOfMid(mid){return parseInt(mid.slice(1),10);}
function userMilestone(name){
  const pr=DB.progress[name];if(!pr||!pr.countries)return null;
  let hi=0;
  Object.values(pr.countries).forEach(cp=>{
    (cp.done||[]).forEach(mid=>{hi=Math.max(hi,stageOfMid(mid));});});
  if(hi===0)return null;
  return MILESTONES.find(m=>hi>=m.min&&hi<=m.max);
}
function userHardSpots(name){
  const pr=DB.progress[name];if(!pr||!pr.countries)return[];
  const out=[];
  Object.entries(pr.countries).forEach(([c,cp])=>{
    Object.entries(cp.reviews||{}).forEach(([mid,n])=>{
      if(n>=3){const sid=stageOfMid(mid);const st=STAGES.find(s=>s.id===sid);
        out.push(THEMES[c].emoji+' '+st.name+' · '+(MISSIONS[mid]?MISSIONS[mid].name:mid));}});});
  return [...new Set(out)];
}
