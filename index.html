<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>한글 친구들 — 십이간지와 한글 모험</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
:root{
  --sky:#CDEBFF; --sky2:#F2FBEF;
  --sun:#FFC838; --sun-dk:#E8A80A;
  --melon:#FF6F61; --melon-dk:#E04B3D;
  --mint:#57C99B; --mint-dk:#37A97B;
  --grape:#9B7EDE; --grape-dk:#7B5EC0;
  --ink:#3A3049; --ink-soft:#6E6483;
  --paper:#FFFFFF; --shadow:#B9D9EC;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:'Jua','BM Jua','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  background:linear-gradient(180deg,var(--sky) 0%,var(--sky2) 100%);
  color:var(--ink);overflow-x:hidden;user-select:none;-webkit-user-select:none;}
#app{max-width:520px;margin:0 auto;min-height:100dvh;padding:14px 16px 30px;position:relative;}
.cloud{position:fixed;font-size:44px;opacity:.5;pointer-events:none;z-index:0;animation:drift 60s linear infinite;}
@keyframes drift{from{transform:translateX(-15vw);}to{transform:translateX(115vw);}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}

.top{display:flex;align-items:center;gap:8px;position:relative;z-index:2;margin-bottom:10px;flex-wrap:wrap;}
.top .spacer{flex:1;}
.chip{background:var(--paper);border:3px solid #EAF2F8;border-radius:999px;padding:6px 13px;font-size:16px;
  box-shadow:0 4px 0 var(--shadow);display:inline-flex;align-items:center;gap:6px;}
.iconbtn{width:46px;height:46px;border-radius:16px;border:3px solid #EAF2F8;background:var(--paper);
  font-size:22px;box-shadow:0 4px 0 var(--shadow);cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:transform .08s;font-family:inherit;}
.iconbtn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--shadow);}

.btn{display:block;width:100%;border:none;border-radius:24px;cursor:pointer;font-family:inherit;font-size:23px;
  color:#fff;padding:16px 20px;background:var(--sun);box-shadow:0 7px 0 var(--sun-dk);
  transition:transform .08s,box-shadow .08s;position:relative;z-index:1;text-align:center;}
.btn:active{transform:translateY(5px);box-shadow:0 2px 0 var(--sun-dk);}
.btn.melon{background:var(--melon);box-shadow:0 7px 0 var(--melon-dk);}
.btn.melon:active{box-shadow:0 2px 0 var(--melon-dk);}
.btn.mint{background:var(--mint);box-shadow:0 7px 0 var(--mint-dk);}
.btn.mint:active{box-shadow:0 2px 0 var(--mint-dk);}
.btn.grape{background:var(--grape);box-shadow:0 7px 0 var(--grape-dk);}
.btn.ghost{background:var(--paper);color:var(--ink);box-shadow:0 7px 0 var(--shadow);border:3px solid #EAF2F8;}
.btn.ghost:active{box-shadow:0 2px 0 var(--shadow);}
.btn.small{font-size:18px;padding:11px 16px;border-radius:18px;width:auto;display:inline-block;}
.btn:disabled{opacity:.45;pointer-events:none;}

.guide{display:flex;align-items:flex-end;gap:12px;margin:8px 0 16px;position:relative;z-index:2;}
.guide .face{font-size:62px;line-height:1;animation:floaty 3s ease-in-out infinite;cursor:pointer;
  filter:drop-shadow(0 6px 0 rgba(58,48,73,.12));position:relative;}
@keyframes floaty{0%,100%{transform:translateY(0);}50%{transform:translateY(-9px);}}
.face.sleep{animation:none;}
.zzz{position:absolute;top:-14px;right:-16px;font-size:22px;animation:zfloat 2.2s ease-in-out infinite;}
@keyframes zfloat{0%{transform:translateY(0);opacity:0;}30%{opacity:1;}100%{transform:translateY(-22px);opacity:0;}}
.bubble{background:var(--paper);border:3px solid #EAF2F8;border-radius:22px;border-bottom-left-radius:6px;
  padding:12px 16px;font-size:19px;box-shadow:0 5px 0 var(--shadow);flex:1;animation:pop .35s ease;}
.bubble b{color:var(--melon);}

.card{background:var(--paper);border:3px solid #EAF2F8;border-radius:26px;box-shadow:0 7px 0 var(--shadow);
  padding:18px;position:relative;z-index:1;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
h1{font-size:32px;text-align:center;margin:6px 0 2px;letter-spacing:1px;}
h2{font-size:23px;margin-bottom:10px;}
.sub{color:var(--ink-soft);font-size:16px;text-align:center;margin-bottom:14px;}

.opt{background:var(--paper);border:4px solid #EAF2F8;border-radius:26px;cursor:pointer;
  box-shadow:0 7px 0 var(--shadow);padding:16px 8px;text-align:center;
  transition:transform .08s,border-color .15s,background .15s;animation:pop .3s ease backwards;}
.opt:nth-child(2){animation-delay:.06s;}.opt:nth-child(3){animation-delay:.12s;}.opt:nth-child(4){animation-delay:.18s;}
.opt:active{transform:translateY(4px);box-shadow:0 3px 0 var(--shadow);}
.opt .em{font-size:52px;display:block;line-height:1.15;}
.opt .tx{font-size:26px;display:block;margin-top:4px;}
.opt .nm{font-size:15px;color:var(--ink-soft);}
.opt.hg .tx{font-size:44px;}
.opt.good{border-color:var(--mint);background:#EAFBF4;animation:pop2 .4s ease;}
.opt.bad{border-color:var(--melon);animation:shake .4s ease;}
@keyframes pop{from{transform:scale(.6);opacity:0;}to{transform:scale(1);opacity:1;}}
@keyframes pop2{0%{transform:scale(1);}40%{transform:scale(1.12);}100%{transform:scale(1);}}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}

.qbox{text-align:center;margin-bottom:16px;}
.qbox .qbig{font-size:54px;line-height:1.2;}
.qbox .qtx{font-size:22px;margin-top:4px;}
.dots{display:flex;gap:7px;justify-content:center;margin:10px 0 16px;flex-wrap:wrap;}
.dot{width:12px;height:12px;border-radius:50%;background:#DCE9F2;}
.dot.on{background:var(--sun);}
.speaker{font-size:38px;background:none;border:none;cursor:pointer;animation:wiggle 2.5s ease-in-out infinite;}
@keyframes wiggle{0%,88%,100%{transform:rotate(0);}92%{transform:rotate(-12deg);}96%{transform:rotate(12deg);}}

.stage{display:flex;align-items:center;gap:14px;background:var(--paper);border:3px solid #EAF2F8;
  border-radius:24px;box-shadow:0 6px 0 var(--shadow);padding:13px 16px;margin-bottom:11px;cursor:pointer;
  transition:transform .08s;position:relative;z-index:1;}
.stage:active{transform:translateY(3px);}
.stage .se{font-size:40px;}
.stage .sn{font-size:20px;}.stage .sd{font-size:14px;color:var(--ink-soft);}
.stage .fill{flex:1;}
.stage.lock{filter:grayscale(1);opacity:.55;}
.stage.chal{border-color:var(--grape);background:linear-gradient(135deg,#F6F1FF,#fff);}
.stagebadge{font-size:20px;}

/* ---------- eggs ---------- */
.egg{width:64px;height:80px;border-radius:50% 50% 46% 46% / 60% 60% 42% 42%;
  background:#fff;border:3px solid #EDE6D6;position:relative;margin:0 auto;
  box-shadow:inset -6px -8px 0 rgba(0,0,0,.04),0 4px 0 var(--shadow);}
.egg.mini{width:34px;height:43px;border-width:2px;}
.egg .pat{position:absolute;inset:6px;border-radius:inherit;opacity:.75;}
.egg .crk{position:absolute;inset:0;border-radius:inherit;background-repeat:no-repeat;background-size:70% 70%;background-position:center 30%;}
.egg.c1 .crk{background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><polyline points="30,30 42,42 36,56" fill="none" stroke="%23907d61" stroke-width="5" stroke-linecap="round"/></svg>');}
.egg.c2 .crk{background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><polyline points="30,28 42,42 36,58 52,54 58,72" fill="none" stroke="%23907d61" stroke-width="5" stroke-linecap="round"/><polyline points="62,26 56,40 68,46" fill="none" stroke="%23907d61" stroke-width="4" stroke-linecap="round"/></svg>');}
.egg.c2{animation:eggshake 1.6s ease-in-out infinite;}
@keyframes eggshake{0%,84%,100%{transform:rotate(0);}88%{transform:rotate(-7deg);}92%{transform:rotate(7deg);}96%{transform:rotate(-4deg);}}
.egg.tap{animation:eggtap .4s ease;}
@keyframes eggtap{0%,100%{transform:rotate(0) scale(1);}30%{transform:rotate(-9deg) scale(1.06);}60%{transform:rotate(9deg) scale(1.06);}}
.eggslot{text-align:center;padding:8px 4px;}
.eggslot .gz{height:9px;background:#E7EFF5;border-radius:99px;overflow:hidden;margin:6px 4px 2px;}
.eggslot .gz i{display:block;height:100%;background:linear-gradient(90deg,var(--sun),var(--melon));border-radius:99px;}
.eggslot .need{font-size:11px;color:var(--ink-soft);}
.friendslot{text-align:center;padding:8px 4px;animation:pop .3s ease;}
.friendslot .fe{font-size:44px;line-height:1.1;position:relative;display:inline-block;}
.friendslot .wear{position:absolute;font-size:19px;top:-10px;right:-12px;}
.friendslot .ride{position:absolute;font-size:18px;bottom:-6px;right:-14px;}
.friendslot .nm{font-size:12px;color:var(--ink-soft);display:block;margin-top:2px;}
.colgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.pbarwrap{background:#E3EEF6;border-radius:999px;height:20px;overflow:hidden;margin:6px 0 4px;border:3px solid #fff;}
.pbar{height:100%;background:linear-gradient(90deg,var(--sun),var(--melon));border-radius:999px;transition:width .6s ease;}
.pct{font-size:14px;color:var(--ink-soft);text-align:right;}

/* ---------- sentence / story ---------- */
.senslot{min-height:64px;background:rgba(255,255,255,.7);border:3px dashed #C9DDEB;border-radius:20px;
  display:flex;flex-wrap:wrap;gap:8px;padding:10px;margin-bottom:16px;align-items:center;justify-content:center;}
.wchip{background:var(--paper);border:3px solid #EAF2F8;border-radius:16px;box-shadow:0 5px 0 var(--shadow);
  padding:8px 14px;font-size:22px;cursor:pointer;animation:pop .3s ease backwards;}
.wchip:active{transform:translateY(3px);box-shadow:0 2px 0 var(--shadow);}
.wchip.inslot{background:#FFF6DB;border-color:#F4DFA0;box-shadow:0 5px 0 #EAD37E;}
.chippool{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
.storypage{text-align:center;}
.storypage .se{font-size:92px;line-height:1.1;margin:12px 0;animation:floaty 3.4s ease-in-out infinite;display:inline-block;}
.storypage .st{font-size:27px;line-height:1.5;}
.pagenum{color:var(--ink-soft);font-size:15px;margin-top:10px;}

/* ---------- reward / challenge ---------- */
.reward{text-align:center;padding-top:26px;position:relative;z-index:2;}
.reward .big{font-size:96px;animation:pop2 .6s ease;display:inline-block;}
.reward h1{font-size:34px;}
.starrow{font-size:42px;letter-spacing:6px;margin:8px 0;}
.stickercard{display:inline-block;background:var(--paper);border:4px solid var(--sun);border-radius:24px;
  padding:16px 26px;box-shadow:0 7px 0 var(--sun-dk);margin:12px 0;animation:pop .5s ease .3s backwards;}
.stickercard .se{font-size:58px;display:block;}
.stickercard .sn{font-size:17px;color:var(--ink-soft);}
.confetti{position:fixed;top:-20px;font-size:22px;z-index:50;pointer-events:none;animation:cfall linear forwards;}
@keyframes cfall{to{transform:translateY(110vh) rotate(720deg);}}
.micbtn{width:120px;height:120px;border-radius:50%;border:none;background:var(--melon);color:#fff;
  font-size:52px;box-shadow:0 8px 0 var(--melon-dk);cursor:pointer;margin:14px auto;display:block;font-family:inherit;}
.micbtn:active{transform:translateY(5px);box-shadow:0 3px 0 var(--melon-dk);}
.micbtn.listen{animation:pulse 1s ease-in-out infinite;background:var(--mint);box-shadow:0 8px 0 var(--mint-dk);}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
.attempts{font-size:17px;color:var(--ink-soft);margin-top:6px;}
.timerwrap{height:14px;background:#E3EEF6;border-radius:99px;overflow:hidden;margin:12px 0;border:2px solid #fff;}
.word{font-size:48px;font-weight:900;margin:8px 0 14px;letter-spacing:3px;}
.tries{display:flex;justify-content:center;gap:10px;margin:14px 0 10px;}
.try{width:34px;height:34px;border-radius:50%;background:#E3EEF6;display:flex;align-items:center;
  justify-content:center;font-size:16px;color:#9AB2C4;border:2px solid #fff;}
.try.now{background:var(--sun);color:#fff;animation:pop2 .4s ease;}
.try.used{background:#F6D7D7;color:#D98080;}
.timerbar{height:100%;background:linear-gradient(90deg,var(--mint),var(--sun));border-radius:99px;}
@keyframes timerrun{from{width:100%;}to{width:0%;}}

/* ---------- inputs / admin ---------- */
.inp{width:100%;font-family:inherit;font-size:19px;padding:12px 14px;border:3px solid #EAF2F8;
  border-radius:16px;background:#FBFDFF;color:var(--ink);outline:none;margin-bottom:10px;}
.inp:focus{border-color:var(--sun);}
.adminrow{border-bottom:2px dashed #E3EEF6;padding:13px 0;}
.adminrow .nm{font-size:20px;}
.adminrow .meta{font-size:14px;color:var(--ink-soft);margin:4px 0 6px;}
.rowbtns{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.tiny{font-size:14px;padding:7px 12px;border-radius:12px;border:none;font-family:inherit;cursor:pointer;color:#fff;}
.tiny.b1{background:var(--mint);}.tiny.b2{background:var(--grape);}.tiny.b3{background:var(--melon);}
.note{font-size:14px;color:var(--ink-soft);background:#FFF6DB;border:2px solid #F4DFA0;border-radius:14px;
  padding:10px 12px;margin:10px 0;line-height:1.5;}
.center{text-align:center;}.mt{margin-top:14px;}.mb{margin-bottom:14px;}
.fadein{animation:pop .3s ease;}
.padbtns{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px;}
.padbtns button{font-family:inherit;font-size:26px;padding:14px;border-radius:18px;border:3px solid #EAF2F8;
  background:var(--paper);box-shadow:0 5px 0 var(--shadow);cursor:pointer;color:var(--ink);
  animation:pop .25s ease backwards;}
.padbtns button:nth-child(2){animation-delay:.03s;}.padbtns button:nth-child(3){animation-delay:.06s;}
.padbtns button:nth-child(4){animation-delay:.09s;}.padbtns button:nth-child(5){animation-delay:.12s;}
.padbtns button:nth-child(6){animation-delay:.15s;}.padbtns button:nth-child(7){animation-delay:.18s;}
.padbtns button:nth-child(8){animation-delay:.21s;}.padbtns button:nth-child(9){animation-delay:.24s;}
.padbtns button:nth-child(10){animation-delay:.27s;}.padbtns button:nth-child(11){animation-delay:.3s;}
.padbtns button:nth-child(12){animation-delay:.33s;}
.padbtns button:active{transform:translateY(3px);box-shadow:0 2px 0 var(--shadow);}
.pinview{font-size:38px;letter-spacing:12px;text-align:center;min-height:54px;}
.pinview.err{animation:shake .4s ease;color:var(--melon);}
.gtoggle{display:flex;gap:10px;margin-bottom:10px;}
.gtoggle button{flex:1;font-family:inherit;font-size:19px;padding:12px;border-radius:16px;border:3px solid #EAF2F8;
  background:var(--paper);cursor:pointer;color:var(--ink);}
.gtoggle button.sel{border-color:var(--sun);background:#FFF6DB;}
.minibar{height:10px;background:#E7EFF5;border-radius:99px;overflow:hidden;margin:3px 0 7px;}
.minibar i{display:block;height:100%;background:var(--mint);border-radius:99px;}
.mslabel{display:inline-block;background:#EFE9FF;color:var(--grape-dk);border-radius:99px;padding:4px 12px;font-size:14px;margin:4px 0;}
</style>
</head>
<body>
<div class="cloud" style="top:8%;animation-duration:55s;">☁️</div>
<div class="cloud" style="top:26%;animation-duration:75s;animation-delay:-35s;">☁️</div>
<div class="cloud" style="top:58%;animation-duration:95s;animation-delay:-60s;font-size:30px;">☁️</div>
<div id="app"></div>
<script>
/* ============================================================
   한글 친구들 v2 — 나라별 독립 진도 · 알 부화 · 말하기 도전
   ============================================================ */
/* ---------------- DATA: themes ---------------- */
const THEMES={
 animal:{name:'동물 나라',emoji:'🦁',
  words:[{w:'사자',e:'🦁'},{w:'토끼',e:'🐰'},{w:'코끼리',e:'🐘'},{w:'기린',e:'🦒'},
         {w:'판다',e:'🐼'},{w:'고양이',e:'🐱'},{w:'오리',e:'🦆'},{w:'펭귄',e:'🐧'}],
  sentences:[{s:['사자가','어흥','해요'],e:'🦁'},{s:['토끼가','깡총','뛰어요'],e:'🐰'},
             {s:['오리가','꽥꽥','울어요'],e:'🦆'},{s:['판다가','대나무를','먹어요'],e:'🐼'}],
  stories:[
   {title:'숲속 친구들',pages:[{t:'아침 해가 떠올랐어요',e:'☀️'},{t:'토끼가 깡총깡총 뛰어요',e:'🐰'},
    {t:'사자가 어흥 하고 인사해요',e:'🦁'},{t:'코끼리와 기린도 왔어요',e:'🐘🦒'},{t:'다 같이 신나게 놀아요',e:'🎉'}],
    q:{t:'어흥 하고 인사한 친구는?',opts:[{w:'사자',e:'🦁'},{w:'토끼',e:'🐰'},{w:'오리',e:'🦆'}],a:0}},
   {title:'아기 오리의 산책',pages:[{t:'아기 오리가 뒤뚱뒤뚱 걸어요',e:'🦆'},
    {t:'물가에서 첨벙 헤엄쳐요',e:'💦'},{t:'엄마 오리를 만나 기뻤어요',e:'💕'}],
    q:{t:'아기 오리는 어디서 헤엄쳤나요?',opts:[{w:'물가',e:'💦'},{w:'나무',e:'🌳'},{w:'산',e:'⛰️'}],a:0}},
   {title:'펭귄의 미끄럼틀',pages:[{t:'펭귄이 얼음 언덕에 올라가요',e:'🐧'},
    {t:'슝! 미끄럼을 타요',e:'🧊'},{t:'재미있어서 또 타요',e:'😄'}],
    q:{t:'펭귄은 무엇을 탔나요?',opts:[{w:'미끄럼',e:'🧊'},{w:'자동차',e:'🚗'},{w:'배',e:'⛵'}],a:0}},
   {title:'숲속 운동회',pages:[{t:'오늘은 숲속 운동회 날이에요',e:'🎌'},{t:'토끼와 여우가 달리기를 해요',e:'🐰🦊'},
    {t:'코끼리는 힘자랑을 해요',e:'🐘'},{t:'기린은 목을 높이높이 쭉!',e:'🦒'},
    {t:'판다가 신나게 응원해요',e:'🐼'},{t:'모두 함께 메달을 받았어요',e:'🏅'}],
    q:{t:'달리기를 한 친구는 누구일까요?',opts:[{w:'토끼와 여우',e:'🐰🦊'},{w:'코끼리',e:'🐘'},{w:'판다',e:'🐼'}],a:0}}]},
 dino:{name:'공룡 나라',emoji:'🦖',
  words:[{w:'티라노',e:'🦖'},{w:'브라키오',e:'🦕'},{w:'공룡알',e:'🥚'},{w:'화산',e:'🌋'},
         {w:'발자국',e:'🐾'},{w:'뼈다귀',e:'🦴'},{w:'둥지',e:'🪺'},{w:'나무',e:'🌳'}],
  sentences:[{s:['티라노가','쿵쿵','걸어요'],e:'🦖'},{s:['브라키오가','나뭇잎을','먹어요'],e:'🦕'},
             {s:['공룡알이','데굴데굴','굴러요'],e:'🥚'},{s:['화산이','펑','터졌어요'],e:'🌋'}],
  stories:[
   {title:'아기 공룡의 하루',pages:[{t:'알에서 아기 공룡이 나왔어요',e:'🥚'},{t:'엄마를 찾아 아장아장 걸어요',e:'🐾'},

/* ---------------- STORAGE / STATE ---------------- */
const DB_KEY='hangul12-data-v2';
let DB={pin:null,users:[],progress:{}};
let storageOK=true;
async function loadDB(){
  try{const r=await window.storage.get(DB_KEY);if(r&&r.value){DB=JSON.parse(r.value);}}
  catch(e){
    try{const old=await window.storage.get('hangul12-data-v1');
      if(old&&old.value){const o=JSON.parse(old.value);
        DB.pin=o.pin||null;DB.users=(o.users||[]).map(u=>({name:u.name,g:'boy'}));}}catch(e2){}
  }
  if(!DB.users)DB.users=[];if(!DB.progress)DB.progress={};
  if(DB.users.length===0){DB.users.push({name:'체험 친구',g:'boy'});await saveDB();}
}
async function saveDB(){
  try{const r=await window.storage.set(DB_KEY,JSON.stringify(DB));if(!r)storageOK=false;}
  catch(e){storageOK=false;}
}

}

/* ---------------- AUDIO / FX ---------------- */
function speak(t){
  if(!state.sound)return;
  try{const u=new SpeechSynthesisUtterance(t);u.lang='ko-KR';u.rate=0.85;u.pitch=1.15;
    speechSynthesis.cancel();speechSynthesis.speak(u);}catch(e){}
}
let AC=null;
function tone(f,d,delay,type,g){
  if(!state.sound)return;
  try{AC=AC||new (window.AudioContext||window.webkitAudioContext)();
    const o=AC.createOscillator(),v=AC.createGain();
    o.type=type||'sine';o.frequency.value=f;o.connect(v);v.connect(AC.destination);
    const s=AC.currentTime+(delay||0);const gg=g||0.12;
    v.gain.setValueAtTime(gg,s);v.gain.exponentialRampToValueAtTime(0.001,s+d);
    o.start(s);o.stop(s+d);}catch(e){}
}
function sfxGood(){tone(660,.12);tone(880,.2,.1);}
function sfxBad(){tone(170,.22,0,'square',.06);}
function sfxWin(){[523,659,784,1046].forEach((f,i)=>tone(f,.22,i*.12));}
function sfxClick(){tone(500,.06,0,'triangle',.08);}
function sfxHatch(){[392,523,659,784,1046,1318].forEach((f,i)=>tone(f,.25,i*.1));}
function confetti(){

  }
}

    const opts=shuffle(b.o);
    return{type:'choice',prompt:{big:'🔊',text:'소리를 듣고 글자를 찾아 줘!'},
      speak:b.w+'! '+b.w+'!',
      opts:opts.map(o=>({text:o})),hg:true,answer:opts.indexOf(b.w),say:b.w+'! 귀가 밝구나!'};});
  if(mid==='s7m5'){const qs=[];
    for(let i=0;i<5;i++){
      const y=BATCHIM[i%BATCHIM.length];const ns=pick(NOBAT,2);
      const opts=shuffle([{w:y.w,e:y.e,ok:true},...ns.map(n=>({w:n.w,e:n.e,ok:false}))]);
      qs.push({type:'choice',prompt:{text:'받침이 있는 낱말을 찾아 줘!'},
        speak:'받침이 콩 하고 붙어 있는 낱말은 어느 것일까?',
        opts:opts.map(o=>({emoji:o.e,text:o.w})),answer:opts.findIndex(o=>o.ok),say:y.w+'! 받침 발견!'});}
    return qs;}
  /* --- stage 8 --- */
  if(mid==='s8m1')return T.sentences.map(s=>({type:'sentence',words:s.s,emoji:s.e,
    speak:'낱말을 눌러서 문장을 만들어 줘! '+s.s.join(' ')}));
  if(mid==='s8m2')return shuffle(T.sentences).map(s=>{
    const wrong=pick(T.sentences.filter(x=>x.e!==s.e),2);
    const opts=shuffle([s,...wrong]);
    return{type:'choice',prompt:{text:'「'+s.s.join(' ')+'」 맞는 그림은?'},
      speak:s.s.join(' ')+'! 맞는 그림을 찾아 줘!',
      opts:opts.map(o=>({emoji:o.e})),answer:opts.indexOf(s),say:'문장을 읽었구나! 최고!'};});
  if(mid==='s8m3')return shuffle(T.sentences).map(s=>{
    const mids=T.sentences.map(x=>x.s[1]);
    const opts=shuffle([s.s[1],...pick(mids.filter(m=>m!==s.s[1]),2)]);
    return{type:'choice',prompt:{big:s.e,text:s.s[0]+' ❓ '+s.s[2]},
      speak:s.s[0]+', 무엇, '+s.s[2]+'! 빈칸에 들어갈 말은?',
      opts:opts.map(o=>({text:o})),answer:opts.indexOf(s.s[1]),say:s.s.join(' ')+'!'};});
  if(mid==='s8m4')return shuffle(T.sentences).map(s=>{
    const right=s.s.join(' ');
    let wrongArr=shuffle(s.s);while(wrongArr.join(' ')===right)wrongArr=shuffle(s.s);
    const opts=shuffle([{t:right,ok:true},{t:wrongArr.join(' '),ok:false}]);
    return{type:'choice',prompt:{big:s.e,text:'바른 문장은 어느 것일까?'},
      speak:'두 문장 중에 바른 문장을 찾아 줘!',
      opts:opts.map(o=>({text:o.t})),answer:opts.findIndex(o=>o.ok),say:right+'! 바른 문장!'};});
  if(mid==='s8m5')return shuffle(T.sentences).map(s=>{
    const subj=s.s[0].replace(/[가이]$/,'');
    const wrong=pick(W.filter(x=>x.w!==subj),2);
    const opts=shuffle([{w:subj,e:s.e},...wrong]);
    return{type:'choice',prompt:{text:s.s[1]+' '+s.s[2]+'! 누구일까요?'},
      speak:s.s[1]+' '+s.s[2]+'! 누구일까요?',
      opts:opts.map(o=>({emoji:o.e,text:o.w})),answer:opts.findIndex(o=>o.w===subj),say:subj+'! 정답!'};});
  /* --- stage 9 --- */
  if(mid==='s9m1')return[{type:'story',story:T.stories[0]}];
  if(mid==='s9m2')return[{type:'story',story:T.stories[1]}];
  if(mid==='s9m3')return[{type:'story',story:T.stories[2]}];
  if(mid==='s9m4')return[{type:'story',story:T.stories[3]}];
  return[];
}
/* ---------------- CHALLENGE WORD SETS ---------------- */
function challengeItems(stageId,tk){
  const T=THEMES[tk];
  if(stageId<=3)return pick(T.words,3).map(w=>({word:w.w,e:w.e}));
  if(stageId===4)return pick(VOWELS,3).map(v=>({word:v.s,e:'🎵'}));
  if(stageId===5)return pick(CVS,3).map(c=>({word:c.l,e:'🔔'}));
  if(stageId===6)return pick(COMBOS,3).map(c=>({word:c.r,e:'🏭'}));
  if(stageId===7)return pick(BATCHIM,3).map(b=>({word:b.w,e:b.e}));
  if(stageId===8){const s=pick(T.sentences,1)[0];
    return[{word:s.s[0],e:s.e},{word:s.s[1],e:'💬'},{word:s.s.join(' '),e:'📝',sentence:true}];}
  return pick(T.words,2).map(w=>({word:w.w,e:w.e}))
    .concat([{word:T.stories[0].title,e:'📖'}]);
}

/* ---------------- GAME ENGINE ---------------- */
function startMission(mid){
  const cp=cprog();
  const isFirst=!cp.done.includes(mid);
  if(isFirst&&daily().used>=DAILY_LIMIT){go('sleep');return;}
  const qs=genQuestions(mid,state.theme);
  if(!qs.length){speak('이 놀이는 준비 중이야!');return;}
  state.game={mid,qs,i:0,lock:false,sen:null,storyPage:0,streak:0,flashDone:false,flashTimer:null,isFirst};
  go('game');
}
function gameHeader(){
  const g=state.game;
  const dots=g.qs.map((_,i)=>`<span class="dot${i<=g.i?' on':''}"></span>`).join('');
  return`<div class="top"><button class="iconbtn" id="quitBtn">←</button>
    <span class="chip">📌 ${MISSIONS[g.mid].name}</span></div>
    <div class="dots">${dots}</div>`;
}
function bindQuit(){$('#quitBtn').onclick=()=>{sfxClick();
  const g=state.game;if(g&&g.flashTimer)clearTimeout(g.flashTimer);
  try{speechSynthesis.cancel();}catch(e){}go('stage');};}
function rGame(){
  const g=state.game;const q=g.qs[g.i];
  if(!q)return finishMission();
  if(q.type==='choice')return rChoice(q);
  if(q.type==='flash')return rFlash(q);
  if(q.type==='sentence')return rSentence(q);
  if(q.type==='story')return rStory(q);
}
function optHTML(o,hg){
  return (o.emoji?`<span class="em">${o.emoji}</span>`:'')+
    (o.text?`<span class="tx"${hg?' style="font-size:42px;"':''}>${o.text}</span>`:'')+
    (o.sub?`<span class="nm">${o.sub}</span>`:'');
}
function rChoice(q){
  app.innerHTML=gameHeader()+`
   <div class="qbox">
     ${q.prompt.big?`<div class="qbig">${q.prompt.big}</div>`:''}
     ${q.prompt.text?`<div class="qtx">${q.prompt.text}</div>`:''}
     <button class="speaker" id="spk">🔊</button>
   </div>
   <div class="${q.opts.length===2?'grid2':(q.opts.length===3?'grid3':'grid2')}" id="og"></div>`;
  bindQuit();
  const og=$('#og');
  q.opts.forEach((o,i)=>{
    const d=document.createElement('div');d.className='opt';
    d.innerHTML=optHTML(o,q.hg);
    d.onclick=()=>answerChoice(d,i===q.answer,q);
    og.appendChild(d);
  });
  $('#spk').onclick=()=>speak(q.speak);
  speak(q.speak);
}
function rFlash(q){
  const g=state.game;
  if(!g.flashDone){
    app.innerHTML=gameHeader()+`
     <div class="qbox"><div class="qtx">✨ 잘 봐! 곧 사라져요!</div>
       <div class="qbig" style="font-size:90px;">${q.flash}</div></div>`;
    bindQuit();speak(q.speak);
    g.flashTimer=setTimeout(()=>{g.flashDone=true;render();},2200);
    return;
  }
  app.innerHTML=gameHeader()+`
   <div class="qbox"><div class="qbig">❓</div>
     <div class="qtx">${q.prompt.text}</div></div>
   <div class="grid3" id="og"></div>`;
  bindQuit();
  const og=$('#og');
  q.opts.forEach((o,i)=>{
    const d=document.createElement('div');d.className='opt';
    d.innerHTML=optHTML(o,q.hg);
    d.onclick=()=>answerChoice(d,i===q.answer,q);
    og.appendChild(d);
  });
  speak('방금 본 글자는 어느 것일까?');
}
function answerChoice(el,ok,q){
  const g=state.game;if(g.lock)return;
  if(ok){
    g.lock=true;g.streak++;el.classList.add('good');sfxGood();
    if(g.streak>=3&&g.streak%3===0){confetti();speak((q.say||'')+' 연속 '+g.streak+'개! 불꽃이다!');}
    else speak(q.say||randPraise());
    setTimeout(()=>{g.i++;g.lock=false;g.flashDone=false;render();},1100);
  }else{
    g.streak=0;el.classList.add('bad');sfxBad();speak('아니야, 다시 한번!');
    setTimeout(()=>el.classList.remove('bad'),450);
  }
}
function rSentence(q){
  const g=state.game;
  if(!g.sen)g.sen={pool:shuffle(q.words.slice()),picked:[]};
  const sen=g.sen;
  app.innerHTML=gameHeader()+`
   <div class="qbox"><div class="qbig">${q.emoji}</div>
     <div class="qtx">낱말을 눌러 문장을 만들어 줘!</div>
     <button class="speaker" id="spk">🔊</button></div>
   <div class="senslot" id="slot">${sen.picked.length?'':'<span style="color:#B9CBD8;font-size:17px">여기에 문장이 생겨요</span>'}</div>
   <div class="chippool" id="pool"></div>`;
  bindQuit();
  const slot=$('#slot'),pool=$('#pool');
  sen.picked.forEach((w,i)=>{
    const c=document.createElement('span');c.className='wchip inslot';c.textContent=w;
    c.onclick=()=>{sfxClick();sen.pool.push(w);sen.picked.splice(i,1);render();};
    slot.appendChild(c);
  });
  sen.pool.forEach((w,i)=>{
    const c=document.createElement('span');c.className='wchip';c.textContent=w;
    c.onclick=()=>{sfxClick();speak(w);sen.picked.push(w);sen.pool.splice(i,1);
      if(sen.pool.length===0)checkSentence(q);else render();};
    pool.appendChild(c);
  });
  $('#spk').onclick=()=>speak(q.words.join(' '));

function collectUnlocks(country,fn){
  const p=prog();
  if(!p.trackOrder.includes(country)&&fn)p.trackOrder.push(country);
  const ti=trackOf(country);
  const before=ti>=0?unlockedInTrack(ti):0;
  fn&&fn();
  const after=ti>=0?unlockedInTrack(ti):(trackOf(country)>=0?unlockedInTrack(trackOf(country)):0);
  const ti2=trackOf(country);
  const items=[];
  for(let k=before+1;k<=after;k++)items.push({type:'ceremony',track:ti2,idx:k-1});
  return items;
}
function finishMission(){
  const g=state.game;const cp=cprog();const mid=g.mid;const p=prog();
  let stars=0,firstTime=false,reviewFull=false;
  const newItems=[];
  if(!cp.done.includes(mid)){
    firstTime=true;stars=3;
    newItems.push(...collectUnlocks(state.theme,()=>{cp.done.push(mid);cp.stars+=3;}));
    daily().used++;
  }else{
    const rv=cp.reviews[mid]||0;
    if(rv<3){cp.reviews[mid]=rv+1;stars=1;
      newItems.push(...collectUnlocks(state.theme,()=>{cp.stars+=1;}));}
    else reviewFull=true;
  }
  saveDB();

  let soon=null;

        const M=[['🥚','새 친구가 알을 깨고 나와'],['👕','새 옷 선물이 나와'],
                 ['🚗','새 탈것이 도착해'],['💎','새 보물이 반짝여']][ti]||['🎁','새 선물이 나와'];
        soon={left,e:M[0],msg:M[1]};
      }
    }
  }
  state.queue=newItems;
  state.rewardInfo={stars,firstTime,reviewFull,soon};
  go('reward');
}

function onlyHangul(s){return (s||'').replace(/[^가-힣]/g,'');}
function judgeSpeech(said,target,attempt){
  const t=onlyHangul(target),h=onlyHangul(said);
  if(attempt>=3)return h.length>0;               /* 소리(말)만 냈다면 통과 */
  if(attempt===2){                                /* 아주 느슨하게 */
    if(h.length===0)return false;
    if(Math.abs(h.length-t.length)<=1)return true;
    for(const ch of h)if(t.includes(ch))return true;
    return false;
  }
  const tol=t.length<=3?0:(t.length<=5?1:2);      /* 1차: 음절 수 일치 */
  return h.length>0&&Math.abs(h.length-t.length)<=tol;
}

function startListening(){
  const c=state.chal;if(c.busy)return;c.busy=true;c.heard=false;
  const mic=$('#mic'),msg=$('#micMsg');
  let rec;
  try{rec=new SR();}catch(e){switchToEar();return;}
  rec.lang='ko-KR';rec.interimResults=false;rec.maxAlternatives=4;
  mic.classList.add('listen');msg.textContent='듣고 있어요... 크게 말해 봐! 👂';
  let finished=false;
  const finish=(said)=>{
    if(finished)return;finished=true;c.busy=false;
    mic&&mic.classList.remove('listen');
    const it=chalItem();
    const alts=Array.isArray(said)?said:[said||''];
    const pass=alts.some(a=>judgeSpeech(a,it.word,c.attempt))||(c.attempt>=3&&c.heard);
    if(pass)chalPass();else chalFail();
  };
  rec.onspeechstart=()=>{c.heard=true;};
  rec.onaudiostart=()=>{};
  rec.onresult=(ev)=>{
    const alts=[];const res=ev.results[0];
    for(let i=0;i<res.length;i++)alts.push(res[i].transcript);
    finish(alts);
  };
  rec.onerror=(ev)=>{

    finish('');
  };

}
/* ---------------- PARENT GATE / PIN (pad renders ONCE) ---------------- */
function makePad(host,onKey){                 /* 재렌더 없이 표시만 갱신 */
  const pad=document.createElement('div');pad.className='padbtns';
  ['1','2','3','4','5','6','7','8','9','⌫','0','✔'].forEach(k=>{
    const b=document.createElement('button');b.textContent=k;
    b.onclick=()=>{sfxClick();onKey(k);};
    pad.appendChild(b);});
  host.appendChild(pad);
}
function openGate(){
  const a=2+Math.floor(Math.random()*7),b=2+Math.floor(Math.random()*7);
  state.gate={a,b,val:''};
  go('gate');
}
function rGate(){
  const g=state.gate;
  app.innerHTML=`
   <div class="top"><button class="iconbtn" id="bk">←</button>
     <span class="chip">👨‍👩‍👧 부모님 확인</span></div>
   <div class="card center" style="max-width:340px;margin:20px auto;">
     <div class="sub">어른인지 확인할게요!</div>
     <h1 id="gq" style="font-size:38px;">${g.a} × ${g.b} = ?</h1>
     <div class="pinview" id="gv">&nbsp;</div>
     <div id="gpad"></div>
   </div>`;
  const gv=$('#gv');
  makePad($('#gpad'),k=>{
    if(k==='⌫'){g.val=g.val.slice(0,-1);}
    else if(k==='✔'){
      if(parseInt(g.val,10)===g.a*g.b){
        sfxGood();
        if(DB.pin){state.gate=null;state.pinVal='';go('pin');}
        else{state.gate=null;go('admin');}
        return;
      }
      sfxBad();gv.classList.add('err');setTimeout(()=>gv.classList.remove('err'),450);
      g.a=2+Math.floor(Math.random()*7);g.b=2+Math.floor(Math.random()*7);g.val='';
      $('#gq').textContent=g.a+' × '+g.b+' = ?';   /* 문제·표시만 갱신, 패드 유지 */
    }
    else if(g.val.length<3)g.val+=k;
    gv.textContent=g.val||'\u00A0';
  });
  $('#bk').onclick=()=>{sfxClick();go('profiles');};
}
function rPin(){
  state.pinVal=state.pinVal||'';
  app.innerHTML=`
   <div class="top"><button class="iconbtn" id="bk">←</button>
     <span class="chip">🔐 비밀번호</span></div>
   <div class="card center" style="max-width:340px;margin:20px auto;">
     <div class="sub">부모님 비밀번호 4자리</div>
     <div class="dots" id="pd">${'<span class="dot"></span>'.repeat(4)}</div>
     <div id="ppad"></div>
   </div>`;
  const dots=()=>{ $('#pd').querySelectorAll('.dot').forEach((d,i)=>
      d.classList.toggle('on',i<state.pinVal.length)); };
  makePad($('#ppad'),k=>{
    if(k==='⌫')state.pinVal=state.pinVal.slice(0,-1);
    else if(k==='✔'){
      if(state.pinVal===DB.pin){sfxGood();state.pinVal='';go('admin');return;}
      sfxBad();state.pinVal='';dots();
      const pd=$('#pd');pd.classList.add('err');
      pd.animate([{transform:'translateX(0)'},{transform:'translateX(-8px)'},{transform:'translateX(8px)'},{transform:'translateX(0)'}],{duration:350});
      return;
    }
    else if(state.pinVal.length<4)state.pinVal+=k;
    dots();                                       /* 점 표시만 갱신, 패드 유지 */
  });
  $('#bk').onclick=()=>{sfxClick();state.pinVal='';go('profiles');};
}
/* ---------------- ADMIN ---------------- */
const MILESTONES=[
  {min:1,max:3,label:'음절 인식 단계',desc:'낱말을 통째로 알아보고 소리 덩어리를 느끼는 시기'},
  {min:4,max:5,label:'글자 소리 익히기 단계',desc:'모음·자음 소리와 글자를 연결하는 시기'},
  {min:6,max:7,label:'글자 조립 단계',desc:'자음+모음을 붙여 새 글자를 만드는 시기'},
  {min:8,max:8,label:'문장 읽기 단계',desc:'짧은 문장을 순서대로 읽는 시기'},
  {min:9,max:9,label:'책 읽기 단계',desc:'짧은 이야기를 스스로 읽는 시기'}];
function stageOfMid(mid){return parseInt(mid.slice(1),10);}
function userMilestone(name){
  const pr=DB.progress[name];if(!pr||!pr.countries)return null;
  let hi=0;
  Object.values(pr.countries).forEach(cp=>{
    (cp.done||[]).forEach(mid=>{hi=Math.max(hi,stageOfMid(mid));});});
  if(hi===0)return null;
  return MILESTONES.find(m=>hi>=m.min&&hi<=m.max);
}
function userHardSpots(name){
  const pr=DB.progress[name];if(!pr||!pr.countries)return[];
  const out=[];
  Object.entries(pr.countries).forEach(([c,cp])=>{
    Object.entries(cp.reviews||{}).forEach(([mid,n])=>{
      if(n>=3){const sid=stageOfMid(mid);const st=STAGES.find(s=>s.id===sid);
        out.push(THEMES[c].emoji+' '+st.name+' · '+(MISSIONS[mid]?MISSIONS[mid].name:mid));}});});
  return [...new Set(out)];
}
function rAdmin(){

     <span class="chip">👨‍👩‍👧 부모님 방</span></div>

  app.innerHTML=html;

      <span style="flex:1;font-size:19px;">${esc(u.name)}</span>
      <button class="iconbtn ud" title="삭제">🗑️</button>`;
    row.querySelector('.ug').onclick=async()=>{sfxClick();
      u.g=u.g==='girl'?'boy':'girl';await saveDB();render();};
    row.querySelector('.ud').onclick=async()=>{sfxClick();
      if(!confirm(u.name+' 기록을 모두 지울까요?'))return;
      DB.users.splice(i,1);delete DB.progress[u.name];await saveDB();render();};
    ul.appendChild(row);
  });
  /* --- 추가 (성별 선택) --- */
  let selG='boy';
  document.querySelectorAll('.gbtn').forEach(b=>{
    b.onclick=()=>{sfxClick();selG=b.dataset.g;

  $('#addU').onclick=async()=>{

    DB.users.push({name:n,g:selG});await saveDB();sfxGood();render();

  /* --- 마일스톤 대시보드 --- */

    const sp=(pr&&pr.speech)||{p1:0,p2:0,p3:0,ear:0};
